<script>
// ============================================
// FASTBURGUER — CAJACOBRO.HTML v2.6.0
// FIX: Boton "Confirmar Cobro" SIEMPRE activo + validaciones con modales de error
// FIX: Separador de miles formatNum aplicado a todos los formatos visuales de dinero
// FIX: CodFormaPago alineado con columna del Sheet (v12.4.6 backend)
// ============================================

var API = "https://script.google.com/macros/s/AKfycbxqlBT5nM5UuJe-5IAXu6YewZxeV5r9FoXBkMYwPD4xkK1llpxakpExC6DspQvnOI6Vmw/exec";
var NRO_PEDIDO = "", ACTION = "", PEDIDO = null, ITEMS = [], FORMAS_PAGO = [], PAGOS = [], CONFIG = {}, TASAS = {};
var PAGOS_ACTUALES = [];

function showLoad() { document.getElementById("load").classList.add("show"); }
function hideLoad() { document.getElementById("load").classList.remove("show"); }
function toast(m, tipo) {
  var t = document.getElementById("toast");
  t.textContent = m; t.className = tipo || "ok"; t.style.display = "block";
  setTimeout(function() { t.style.display = "none"; }, 4000);
}

function mostrarAlerta(tipo, titulo, mensaje, callback, btnText) {
  btnText = btnText || "Entendido";
  var modal = document.getElementById("customAlertModal");
  var icon = document.getElementById("alertIcon");
  var title = document.getElementById("alertTitle");
  var body = document.getElementById("alertBody");
  var btn = document.getElementById("alertBtn");
  title.textContent = titulo; body.textContent = mensaje; btn.textContent = btnText;
  if (tipo === "error") {
    icon.className = "alertIcon error";
    icon.innerHTML = '<svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>';
  } else {
    icon.className = "alertIcon success";
    icon.innerHTML = '<svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
  }
  btn.onclick = function() { modal.classList.remove("show"); if (callback) callback(); };
  modal.classList.add("show");
}

function apiGet(action, params) {
  var url = API + "?action=" + action + "&_cb=" + Date.now();
  if (params) for (var key in params) url += "&" + key + "=" + encodeURIComponent(params[key]);
  return fetch(url).then(function(r) { return r.json(); });
}
function apiPost(d) {
  return fetch(API, { method: "POST", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(d) }).then(function(r) { return r.json(); });
}

function parseNum(v) {
  if (v === null || v === undefined || v === "") return 0;
  var s = String(v).trim();
  if (s.indexOf(",") > -1 && s.indexOf(".") > -1) {
    if (s.lastIndexOf(",") < s.lastIndexOf(".")) {
      // Coma es separador de miles, punto es decimal
    } else {
      s = s.replace(/\./g, "").replace(",", ".");
    }
  } else if (s.indexOf(",") > -1 && s.indexOf(".") === -1) {
    var parts = s.split(",");
    if (parts.length === 2 && parts[1].length <= 2) { s = s.replace(",", "."); }
    else { s = s.replace(/,/g, ""); }
  }
  var n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

// ============================================
// FORMATO NUMERICO: separador de miles + punto decimal
// Backend envia numeros crudos. Frontend formatea visualmente.
// ============================================
function formatNum(v) {
  v = parseFloat(v) || 0;
  var parts = v.toFixed(2).split(".");
  var intPart = parts[0];
  var decPart = parts[1];
  intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return intPart + "." + decPart;
}

function formatMoney(v, codTasa) {
  var formatted = formatNum(v);
  var sym = "$";
  if (codTasa === "T001" || codTasa === "T006") sym = "Bs ";
  else if (codTasa === "T002") sym = "$ ";
  else if (codTasa === "T003") sym = "EUR ";
  else if (codTasa === "T004") sym = "BN ";
  return sym + formatted;
}

function formatTime(h) {
  if (!h) return "--:--";
  var s = String(h);
  if (s.indexOf(":") > -1) return s.substring(0, 5);
  var n = parseFloat(s);
  if (!isNaN(n)) { var hh = Math.floor(n * 24); var mm = Math.round((n * 24 - hh) * 60); return String(hh).padStart(2, "0") + ":" + String(mm).padStart(2, "0"); }
  return "--:--";
}
function getTipoLabel(t) {
  t = String(t || "").toLowerCase();
  if (t === "delivery") return "Delivery";
  if (t === "pickup") return "Pick Up";
  if (t === "sitio") return "En Sitio";
  return t || "N/A";
}
function getEstadoClass(e) { return String(e || "").toLowerCase().replace(/\s/g, ""); }

function init() {
  var params = new URLSearchParams(window.location.search);
  NRO_PEDIDO = params.get("pedido");
  ACTION = params.get("action");
  var validActions = ["cobrar", "liberar", "anular", "reversar"];
  if (!NRO_PEDIDO || validActions.indexOf(ACTION) === -1) {
    mostrarAlerta("error", "Parametros invalidos", "Se requiere ?pedido=XXX&action=cobrar|liberar|anular|reversar", function() { window.location.href = "caja.html"; }, "Regresar");
    return;
  }
  if (ACTION === "liberar" || ACTION === "anular" || ACTION === "reversar") {
    window.location.href = "caja.html?pedido=" + NRO_PEDIDO + "&action=" + ACTION;
    return;
  }
  document.getElementById("pageTitle").textContent = "Cobrar";
  document.getElementById("pageSub").textContent = NRO_PEDIDO;
  showLoad();
  loadConfig().then(function() {
    loadPedido().then(function() {
      loadPagosActuales().then(function() {
        loadFormasPago().then(function() {
          PAGOS = [{ codFormaPago: '', montoPago: '', codTasa: '', referencia: '', confirmed: false }];
          render(); hideLoad();
        }).catch(function(e) { hideLoad(); console.error(e); });
      }).catch(function(e) { hideLoad(); console.error(e); });
    }).catch(function(e) { hideLoad(); console.error(e); });
  }).catch(function(e) { hideLoad(); console.error(e); });
}

function loadConfig() {
  return apiGet("init", {}).then(function(r) {
    if (r.success && r.data && r.data.config) { CONFIG = r.data.config; }
    if (r.success && r.data && r.data.tasas) { r.data.tasas.forEach(function(t) { TASAS[t.CodTasa] = parseNum(t.ValorTasa); }); }
  }).catch(function(e) { throw e; });
}

function loadPedido() {
  return apiGet("getPedidoDetalle", { nroPedido: NRO_PEDIDO }).then(function(r) {
    if (r.success && r.pedido) { PEDIDO = r.pedido; ITEMS = r.items || []; }
    else {
      mostrarAlerta("error", "Pedido no encontrado", "No se encontro " + NRO_PEDIDO, function() { window.location.href = "caja.html"; }, "Regresar");
      return Promise.reject(new Error("Pedido no encontrado"));
    }
  }).catch(function(e) {
    if (e.message !== "Pedido no encontrado") {
      mostrarAlerta("error", "Error de red", "No se pudo cargar el pedido: " + (e.message || "desconocido"), function() { window.location.href = "caja.html"; }, "Regresar");
    }
    throw e;
  });
}

function loadFormasPago() {
  return apiGet("getFormasPagoActivas", {}).then(function(r) {
    if (r.success && r.data) { FORMAS_PAGO = r.data; }
  }).catch(function(e) { toast("Error cargando formas de pago: " + (e.message || "desconocido"), "err"); throw e; });
}

function loadPagosActuales() {
  return apiGet("getPagosPorPedido", { nroPedido: NRO_PEDIDO }).then(function(r) {
    if (r.success && r.data) { PAGOS_ACTUALES = r.data; }
    else { PAGOS_ACTUALES = []; }
  }).catch(function(e) { console.warn("No se pudieron cargar pagos actuales:", e.message); PAGOS_ACTUALES = []; });
}

function render() {
  var container = document.getElementById("mainContent");
  var html = "";
  html += renderPedidoHeaderCard();
  if (ACTION === "cobrar") html += renderCobrarSection();
  else if (ACTION === "liberar") html += renderLiberarSection();
  else if (ACTION === "anular") html += renderAnularSection();
  else if (ACTION === "reversar") html += renderReversarSection();
  html += renderPedidosSection();
  html += renderItems();
  if (ACTION === "cobrar") html += renderBotonesCobro();
  container.innerHTML = html;
  if (ACTION === "cobrar") { renderPaymentRows(); calcTotals(); }
  attachEvents();
}

function renderPedidoHeaderCard() {
  var estadoPedido = String(PEDIDO.EstadoPedido || "").trim();
  var estadoPago = String(PEDIDO.EstadoPago || "").trim();
  var total = formatMoney(PEDIDO.TotalPedido, PEDIDO.CodTasa);
  var pagado = formatMoney(PEDIDO.TotalPagado || 0, PEDIDO.CodTasa);
  var html = '<div class="pedidoHeaderCard">';
  html += '<div class="pedidoHeaderTop">';
  html += '<div class="pedidoNroBig">' + PEDIDO.NroPedido + '</div>';
  html += '<div class="badgeRow">';
  html += '<span class="statusChip ' + getEstadoClass(estadoPedido) + '">' + (estadoPedido || "N/A") + '</span>';
  html += '<span class="statusChip ' + (estadoPago === "Pagado" ? "pagado" : "nopagado") + '">' + (estadoPago === "Pagado" ? "Pagado" : "No Pagado") + '</span>';
  html += '</div></div>';
  html += '<div class="totalesRow">';
  html += '<div class="totalBlock"><div class="totalBlockLabel">Total Pedido</div><div class="totalBlockValue naranja">' + total + '</div></div>';
  html += '<div class="totalBlock" style="text-align:right"><div class="totalBlockLabel">Pagado</div><div class="totalBlockValue pagado">' + pagado + '</div></div>';
  html += '</div></div>';

}

function renderCobrarSection() {
  var totalPedido = parseNum(PEDIDO.TotalPedido);
  var html = '<div class="actionSection">';
  html += '<div class="actionTitle">📋 Formas de Pago</div>';
  html += '<div class="cobrarPagadoRow">';
  html += '<div class="cobrarPagadoCol"><span class="cobrarPagadoLabel">Faltante</span>';
  html += '<input type="text" class="cobrarPagadoInput" id="inputCobrar" value="' + formatMoney(totalPedido, PEDIDO.CodTasa) + '" readonly></div>';
  html += '<div class="cobrarPagadoCol"><span class="cobrarPagadoLabel">Pagado</span>';
  html += '<input type="text" class="cobrarPagadoInput" id="inputPagado" value="' + formatMoney(0, PEDIDO.CodTasa) + '" readonly></div>';
  html += '</div><div id="paymentRows"></div></div>';
  return html;
}

function renderPaymentRows() {
  var container = document.getElementById("paymentRows");
  if (!container) return;
  var html = "";
  PAGOS.forEach(function(p, idx) {
    var isConfirmed = p.confirmed === true;
    html += '<div class="paymentRow ' + (isConfirmed ? 'confirmed' : '') + '" data-idx="' + idx + '">';
    html += '<select class="paymentSelect" data-field="codFormaPago" autocomplete="off" ' + (isConfirmed ? 'disabled' : '') + '>';
    html += '<option value="" ' + (p.codFormaPago ? '' : 'selected') + '>Seleccione forma de pago</option>';
    FORMAS_PAGO.forEach(function(fp) {
      var label = fp.DesPago + (fp.SimboloTasa ? ' (' + fp.SimboloTasa + ')' : '');
      html += '<option value="' + fp.CodFormaPago + '" data-codtasa="' + (fp.CodTasa || '') + '" ' + (p.codFormaPago === fp.CodFormaPago ? 'selected' : '') + '>' + label + '</option>';
    });
    html += '</select>';
    html += '<div class="row2">';
    var montoVal = p.montoPago ? parseNum(p.montoPago).toFixed(2).replace(".", ",") : '';
    html += '<input type="text" placeholder="Monto" data-field="montoPago" value="' + montoVal + '" ' + (isConfirmed ? 'disabled' : '') + '>';
    if (!isConfirmed) {
      html += '<button class="confirmMontoBtn" data-confirm="' + idx + '" type="button">Confirmar</button>';
    } else {
      html += '<button class="confirmMontoBtn editBtn" data-edit="' + idx + '" type="button">✏️ Editar</button>';
    }
    html += '<input type="text" class="refInput" placeholder="Referencia (opcional)" data-field="referencia" value="' + (p.referencia || "") + '" ' + (isConfirmed ? 'disabled' : '') + '>';
    html += '<button class="deleteBtn" data-del="' + idx + '" type="button">🗑️</button>';
    html += '</div></div>';
  });
  container.innerHTML = html;
  PAGOS.forEach(function(p, idx) {
    var row = container.children[idx];
    if (row) { var sel = row.querySelector('select[data-field="codFormaPago"]'); if (sel) sel.value = p.codFormaPago || ''; }
  });
  attachPaymentEvents();
}

function attachPaymentEvents() {
  var container = document.getElementById("paymentRows");
  if (!container) return;
  if (container._delegacionActiva === true) return;

  container.addEventListener("click", function(e) {
    var target = e.target;
    var row = target.closest(".paymentRow");
    if (!row) return;
    var idx = parseInt(row.dataset.idx);
    if (isNaN(idx)) return;

    if (target.classList.contains("confirmMontoBtn") && !target.classList.contains("editBtn")) {
      e.preventDefault(); e.stopPropagation();
      var btnSel = row.querySelector('select[data-field="codFormaPago"]');
      var btnInp = row.querySelector('input[data-field="montoPago"]');
      var btnRef = row.querySelector('input[data-field="referencia"]');
      if (btnSel && btnSel.value) {
        var btnOpt = btnSel.options[btnSel.selectedIndex];
        PAGOS[idx].codFormaPago = btnSel.value;
        PAGOS[idx].codTasa = btnOpt ? btnOpt.dataset.codtasa || "" : "";
      }
      if (btnInp) PAGOS[idx].montoPago = btnInp.value;
      if (btnRef) PAGOS[idx].referencia = btnRef.value;
      confirmarMonto(idx);
      return;
    }

    if (target.classList.contains("deleteBtn")) {
      e.preventDefault(); e.stopPropagation();
      if (PAGOS[idx].confirmed) {
        PAGOS[idx].confirmed = false;
        for (var i = PAGOS.length - 1; i > idx; i--) { if (!PAGOS[i].confirmed) PAGOS.splice(i, 1); }
        renderPaymentRows(); calcTotals(); return;
      }
      PAGOS.splice(idx, 1);
      if (PAGOS.length === 0) { PAGOS.push({ codFormaPago: '', montoPago: '', codTasa: '', referencia: '', confirmed: false }); }
      renderPaymentRows(); calcTotals(); return;
    }
  });

  container.addEventListener("change", function(e) {
    var target = e.target;
    var row = target.closest(".paymentRow");
    if (!row) return;
    var idx = parseInt(row.dataset.idx);
    if (isNaN(idx)) return;
    if (target.tagName === "SELECT" && target.dataset.field === "codFormaPago") {
      var opt = target.options[target.selectedIndex];
      var value = target.value;
      var codTasa = opt ? opt.getAttribute('data-codtasa') || opt.dataset.codtasa || "" : "";
      if (!value && opt && opt.text) {
        var optText = opt.text.trim();
        FORMAS_PAGO.forEach(function(fp) { var fpLabel = fp.DesPago + (fp.SimboloTasa ? ' (' + fp.SimboloTasa + ')' : ''); if (fpLabel === optText) { value = fp.CodFormaPago; } });
      }
      PAGOS[idx].codFormaPago = value;
      PAGOS[idx].codTasa = codTasa;
      var codTasaPedido = PEDIDO.CodTasa || "T002";
      var valorTasaPedido = TASAS[codTasaPedido] || 1;
      var valorTasaPago = TASAS[codTasa] || 1;
      var saldo = getSaldoFaltante(idx);
      if (saldo > 0.01) { PAGOS[idx].montoPago = (saldo * (valorTasaPedido / valorTasaPago)).toFixed(2); }
      else { PAGOS[idx].montoPago = ""; }
      var inp = row.querySelector('input[data-field="montoPago"]');
      if (inp) { var mv = PAGOS[idx].montoPago ? parseNum(PAGOS[idx].montoPago).toFixed(2).replace(".", ",") : ""; inp.value = mv; }
      calcTotals();
    }
  });

  container.addEventListener("input", function(e) {
    var target = e.target;
    var row = target.closest(".paymentRow");
    if (!row) return;
    var idx = parseInt(row.dataset.idx);
    if (isNaN(idx)) return;
    if (target.tagName === "INPUT" && target.dataset.field === "montoPago") { PAGOS[idx].montoPago = target.value; calcTotals(); }
    else if (target.tagName === "INPUT" && target.dataset.field === "referencia") { PAGOS[idx].referencia = target.value; }
  });

  container.addEventListener("click", function(e) {
    var target = e.target;
    if (!target.classList.contains("editBtn")) return;
    var row = target.closest(".paymentRow");
    if (!row) return;
    var idx = parseInt(row.dataset.idx);
    if (isNaN(idx)) return;
    e.preventDefault(); e.stopPropagation();
    PAGOS[idx].confirmed = false;
    for (var i = PAGOS.length - 1; i > idx; i--) { if (!PAGOS[i].confirmed) PAGOS.splice(i, 1); }
    renderPaymentRows(); calcTotals();
  });

  container._delegacionActiva = true;
}

function confirmarMonto(idx) {
  var container = document.getElementById("paymentRows");
  var row = container ? container.children[idx] : null;
  var sel = row ? row.querySelector('select[data-field="codFormaPago"]') : null;
  var inp = row ? row.querySelector('input[data-field="montoPago"]') : null;
  var ref = row ? row.querySelector('input[data-field="referencia"]') : null;
  var p = PAGOS[idx];

  if (sel) {
    var selectedValue = sel.value;
    var selectedIndex = sel.selectedIndex;
    var opt = sel.options[selectedIndex];
    var dataCodTasa = opt ? opt.getAttribute('data-codtasa') || opt.dataset.codtasa || '' : '';
    if (!selectedValue && opt && opt.text) {
      var optText = opt.text.trim();
      FORMAS_PAGO.forEach(function(fp) { var fpLabel = fp.DesPago + (fp.SimboloTasa ? ' (' + fp.SimboloTasa + ')' : ''); if (fpLabel === optText) { selectedValue = fp.CodFormaPago; } });
    }
    p.codFormaPago = selectedValue || '';
    p.codTasa = dataCodTasa;
  }
  if (inp) p.montoPago = inp.value || '';
  if (ref) p.referencia = ref.value || '';

  if (!p.codFormaPago) {
    mostrarAlerta("error", "Forma de pago requerida", "Seleccione una forma de pago antes de confirmar.", function() { if (sel) sel.focus(); });
    return;
  }
  var monto = parseNum(p.montoPago);
  if (monto <= 0) {
    mostrarAlerta("error", "Monto invalido", "El monto debe ser mayor a cero.", function() { if (inp) { inp.focus(); inp.select(); } });
    return;
  }
  PAGOS[idx].confirmed = true;
  calcTotals();
  var totalPedido = parseNum(PEDIDO.TotalPedido);
  var codTasaPedido = PEDIDO.CodTasa || "T002";
  var valorTasaPedido = TASAS[codTasaPedido] || 1;
  var totalPagado = 0;
  PAGOS.forEach(function(pp) {
    if (pp.confirmed) { var mm = parseNum(pp.montoPago); var vt = TASAS[pp.codTasa] || 1; totalPagado += mm * (vt / valorTasaPedido); }
  });
  var faltante = totalPedido - totalPagado;
  if (faltante > 0.01) { PAGOS.push({ codFormaPago: '', montoPago: faltante.toFixed(2), codTasa: '', referencia: '', confirmed: false }); }
  renderPaymentRows(); calcTotals();
}

function getSaldoFaltante(excludeIdx) {
  var totalPedido = parseNum(PEDIDO.TotalPedido);
  var codTasaPedido = PEDIDO.CodTasa || "T002";
  var valorTasaPedido = TASAS[codTasaPedido] || 1;
  var totalPagado = 0;
  PAGOS.forEach(function(p, i) {
    if (i === excludeIdx) return;
    if (!p.confirmed) return;
    var monto = parseNum(p.montoPago);
    var valorTasaPago = TASAS[p.codTasa] || 1;
    if (monto > 0 && p.codFormaPago) { totalPagado += monto * (valorTasaPago / valorTasaPedido); }
  });
  return totalPedido - totalPagado;
}

// ============================================
// FIX CRITICO v2.6.0: calcTotals ya NO deshabilita el boton "Confirmar Cobro"
// El boton siempre esta activo. Las validaciones ocurren en submitCobro().
// ============================================
function calcTotals() {
  var totalPedido = parseNum(PEDIDO.TotalPedido);
  var codTasaPedido = PEDIDO.CodTasa || "T002";
  var valorTasaPedido = TASAS[codTasaPedido] || 1;
  var totalPagado = 0;
  PAGOS.forEach(function(p) {
    if (!p.confirmed) return;
    var monto = parseNum(p.montoPago);
    var valorTasaPago = TASAS[p.codTasa] || 1;
    if (monto > 0 && p.codFormaPago) { totalPagado += monto * (valorTasaPago / valorTasaPedido); }
  });
  var inputPagado = document.getElementById('inputPagado');
  var inputCobrar = document.getElementById('inputCobrar');
  if (inputCobrar) inputCobrar.value = formatMoney(totalPedido - totalPagado, codTasaPedido);
  if (inputPagado) inputPagado.value = formatMoney(totalPagado, codTasaPedido);
  // FIX: El boton Confirmar Cobro NUNCA se deshabilita. Siempre activo.
}

// ============================================
// FIX CRITICO v2.6.0: submitCobro valida TODO y muestra errores con modales
// Boton siempre activo. Error -> modal de error. OK -> modal de confirmacion.
// ============================================
function submitCobro() {
  var codTurno = PEDIDO.CodTurno || '';
  if (!codTurno) { mostrarAlerta("error", "Sin Turno", "No se puede cobrar sin un turno activo."); return; }

  var pagosConfirmados = PAGOS.filter(function(p) { return p.confirmed; });
  if (pagosConfirmados.length === 0) {
    mostrarAlerta("error", "Sin pagos confirmados", "Confirme al menos una forma de pago con monto valido antes de cobrar.");
    return;
  }

  var pagosInvalidos = [];
  pagosConfirmados.forEach(function(p, i) {
    if (!p.codFormaPago) pagosInvalidos.push("Pago #" + (i + 1) + ": falta forma de pago");
    if (parseNum(p.montoPago) <= 0) pagosInvalidos.push("Pago #" + (i + 1) + ": monto debe ser mayor a cero");
  });
  if (pagosInvalidos.length > 0) { mostrarAlerta("error", "Pagos invalidos", pagosInvalidos.join("\n")); return; }

  var totalPedido = parseNum(PEDIDO.TotalPedido);
  var codTasaPedido = PEDIDO.CodTasa || "T002";
  var valorTasaPedido = TASAS[codTasaPedido] || 1;
  var totalPagado = 0;
  pagosConfirmados.forEach(function(p) { var vt = TASAS[p.codTasa] || 1; totalPagado += parseNum(p.montoPago) * (vt / valorTasaPedido); });

  if (totalPagado < totalPedido - 0.01) {
    var faltante = totalPedido - totalPagado;
    mostrarAlerta("error", "Cobro incompleto",
      "Faltan " + formatMoney(faltante, codTasaPedido) + " por cobrar.\n\n" +
      "Total pedido: " + formatMoney(totalPedido, codTasaPedido) + "\n" +
      "Total pagado: " + formatMoney(totalPagado, codTasaPedido) + "\n\n" +
      "Agregue otra forma de pago para cubrir el faltante.");
    return;
  }

  var pagosValidos = pagosConfirmados.map(function(p) {
    return { codFormaPago: p.codFormaPago, montoPago: parseNum(p.montoPago), codTasa: p.codTasa || '', referencia: p.referencia || '' };
  });

  var bodyText = "Resumen del cobro:\n\n";
  bodyText += "Total Pedido: " + formatMoney(totalPedido, codTasaPedido) + "\n";
  bodyText += "Total Pagado: " + formatMoney(totalPagado, codTasaPedido) + "\n\n";
  bodyText += "Formas de pago:\n";
  pagosValidos.forEach(function(p, i) {
    var fp = FORMAS_PAGO.find(function(f) { return f.CodFormaPago === p.codFormaPago; });
    bodyText += (i + 1) + ". " + (fp ? fp.DesPago : p.codFormaPago) + ": " + formatMoney(p.montoPago, p.codTasa) + "\n";
  });
  bodyText += "\n¿Desea registrar el cobro?";
  document.getElementById("confirmCobroBody").textContent = bodyText;
  var modal = document.getElementById("confirmCobroModal");
  modal.classList.add("show");
  document.getElementById("btnOkCobro").onclick = function() { modal.classList.remove("show"); ejecutarCobro(pagosValidos); };
  document.getElementById("btnCancelCobro").onclick = function() { modal.classList.remove("show"); };
}

function ejecutarCobro(pagosValidos) {
  var codTurno = PEDIDO.CodTurno || '';
  showLoad();
  apiPost({ action: "registrarPago", nroPedido: NRO_PEDIDO, codTurno: codTurno, pagos: pagosValidos }).then(function(r) {
    hideLoad();
    if (r.success) { mostrarAlerta("success", "Cobro registrado", r.message || "Pago registrado correctamente.", function() { window.location.href = "caja.html"; }, "Regresar a Caja"); }
    else { mostrarAlerta("error", "Error al cobrar", r.error || "Error desconocido"); }
  }).catch(function(e) { hideLoad(); mostrarAlerta("error", "Error de red", e.message); });
}

function renderItems() {

  var html = '<div class="itemsSection" id="itemsSection">';
  html += '<div class="itemsHeader" id="itemsHeader">';
  html += '<div class="itemsTitle">';
  html += '<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#f7931e"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>';

  html += '</div></div>';
  html += '<div class="itemsBody" id="itemsBody">';
  ITEMS.forEach(function(item) {
    var qty = parseInt(item.Cantidad) || 1;
    var price = parseFloat(item.PrecioUnitario) || 0;
    var sub = parseFloat(item.SubtotalItem) || (qty * price);
    html += '<div class="itemRow">';
    html += '<div class="itemQty">' + qty + '</div>';
    html += '<div class="itemInfo"><div class="itemName">' + (item.DesProducto || "Producto") + '</div><div class="itemCat">' + (item.DesCategoria || "") + '</div></div>';
    html += '<div class="itemPrice">' + formatMoney(sub, PEDIDO.CodTasa) + '</div>';
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

// ============================================
// FIX CRITICO v2.6.0: Boton "Confirmar Cobro" SIEMPRE activo (sin disabled)
// Las validaciones ocurren en submitCobro() con modales de error claros.
// ============================================
function renderBotonesCobro() {
  var html = '<div class="btnRow">';
  html += '<button class="actionBtn secondary" id="btnCancelar" type="button">↩️ Regresar sin cobrar</button>';
  html += '<button class="actionBtn primary" id="btnConfirmar" type="button">🛡️ Confirmar Cobro</button>';
  html += '</div>';
  return html;
}

function renderLiberarSection() {
  var estadoPago = String(PEDIDO.EstadoPago || "").trim();
  var html = '<div class="actionSection">';
  html += '<div class="actionTitle">🍳 Liberar a Cocina</div>';
  if (estadoPago !== "Pagado" && CONFIG.PedidoconPagoCaja === "Activo") {
    html += '<div class="warningBox">⚠️ Modo Activo: el pedido debe estar pagado antes de liberar a cocina. Cobre primero.</div>';
  } else if (estadoPago !== "Pagado") {
    html += '<div class="infoBox">ℹ️ Modo Inactivo: puede liberar sin cobrar, pero debe indicar el motivo.</div>';
    html += '<textarea class="obsTextarea" id="obsInput" placeholder="¿Por que libera a cocina sin cobrar? (obligatorio)"></textarea>';
  } else {
    html += '<div class="successBox">✅ El pedido ya esta pagado. Puede liberar a cocina directamente.</div>';
    html += '<textarea class="obsTextarea" id="obsInput" placeholder="Observaciones opcionales..."></textarea>';
  }
  html += '<button class="actionBtn success" id="btnLiberar" type="button">🍳 Liberar a Cocina</button>';
  html += '<button class="actionBtn secondary" id="btnCancelar" type="button">↩️ Regresar sin liberar</button>';
  html += '</div>';
  return html;
}

function submitLiberar() {
  var obs = document.getElementById("obsInput").value.trim();
  var estadoPago = String(PEDIDO.EstadoPago || "").trim();
  if (estadoPago !== "Pagado" && CONFIG.PedidoconPagoCaja !== "Activo" && !obs) {
    mostrarAlerta("error", "Observacion requerida", "Indique por que libera a cocina sin cobrar.");
    return;
  }
  showLoad();
  apiPost({ action: "liberarPedido", nroPedido: NRO_PEDIDO, observaciones: obs }).then(function(r) {
    hideLoad();
    if (r.success) { mostrarAlerta("success", "Liberado", r.message || "Pedido liberado a cocina.", function() { window.location.href = "caja.html"; }, "Regresar a Caja"); }
    else { mostrarAlerta("error", "Error", r.error || "No se pudo liberar"); }
  }).catch(function(e) { hideLoad(); mostrarAlerta("error", "Error de red", e.message); });
}

function renderAnularSection() {
  var html = '<div class="actionSection">';
  html += '<div class="actionTitle">🗑️ Anular Pedido</div>';
  html += '<div class="warningBox">⚠️ Esta accion anula el pedido permanentemente. El estado cambiara a <b>Anulado</b> y no podra revertirse desde aqui.</div>';
  html += '<textarea class="obsTextarea" id="obsInput" placeholder="Motivo de la anulacion (obligatorio)..."></textarea>';
  html += '<button class="actionBtn danger" id="btnAnular" type="button">🗑️ Confirmar Anulacion</button>';
  html += '<button class="actionBtn secondary" id="btnCancelar" type="button">↩️ Regresar</button>';
  html += '</div>';
  return html;
}

function submitAnular() {
  var obs = document.getElementById("obsInput").value.trim();
  if (!obs) { mostrarAlerta("error", "Motivo requerido", "Indique el motivo de la anulacion."); return; }
  showLoad();
  apiPost({ action: "updateEstadoPedido", nroPedido: NRO_PEDIDO, nuevoEstado: "Anulado", observaciones: obs }).then(function(r) {
    hideLoad();
    if (r.success) { mostrarAlerta("success", "Anulado", r.message || "Pedido anulado correctamente.", function() { window.location.href = "caja.html"; }, "Regresar a Caja"); }
    else { mostrarAlerta("error", "Error", r.error || "No se pudo anular"); }
  }).catch(function(e) { hideLoad(); mostrarAlerta("error", "Error de red", e.message); });
}

function renderReversarSection() {
  var html = '<div class="actionSection">';
  html += '<div class="actionTitle">↩️ Reversar Pago</div>';
  var pagosActuales = PAGOS_ACTUALES || [];
  if (pagosActuales.length > 0) {
    html += '<div class="itemsSection" style="margin-bottom:12px"><div class="itemsTitle">Pagos activos a reversar</div>';
    pagosActuales.forEach(function(p) {
      html += '<div class="pagoRow">';
      html += '<div><div class="pagoDesc">' + (p.DesFormaPago || p.DesPago || p.CodFormaPago) + '</div>';
      if (p.Referencia) { html += '<div class="pagoRef">Ref: ' + p.Referencia + '</div>'; }
      html += '</div>';
      html += '<div class="pagoMonto">' + formatMoney(p.MontoPago, p.CodTasa) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  } else {
    html += '<div class="warningBox">No hay pagos activos para reversar en este pedido.</div>';
  }
  html += '<div class="warningBox">⚠️ Se reversaran <b>todos</b> los pagos activos de este pedido. El estado de pago volvera a <b>Pendiente</b>.</div>';
  html += '<textarea class="obsTextarea" id="obsInput" placeholder="Motivo de la reversión (obligatorio)..."></textarea>';
  html += '<button class="actionBtn danger" id="btnReversar" type="button">↩️ Confirmar Reversión</button>';
  html += '<button class="actionBtn secondary" id="btnCancelar" type="button">↩️ Regresar</button>';
  html += '</div>';
  return html;
}

function submitReversar() {
  var obs = document.getElementById("obsInput").value.trim();
  if (!obs) { mostrarAlerta("error", "Motivo requerido", "Indique el motivo de la reversión."); return; }
  showLoad();
  apiPost({ action: "reversarPago", nroPedido: NRO_PEDIDO, observaciones: obs }).then(function(r) {
    hideLoad();
    if (r.success) { mostrarAlerta("success", "Reversado", r.message || "Pagos reversados correctamente.", function() { window.location.href = "caja.html"; }, "Regresar a Caja"); }
    else { mostrarAlerta("error", "Error", r.error || "No se pudo reversar"); }
  }).catch(function(e) { hideLoad(); mostrarAlerta("error", "Error de red", e.message); });
}

function attachEvents() {
  var btnBack = document.getElementById("btnBack");
  if (btnBack) btnBack.onclick = function() { window.location.href = "caja.html"; };

  var btnCancelar = document.getElementById("btnCancelar");
  if (btnCancelar) btnCancelar.onclick = function() { window.location.href = "caja.html"; };

  var btnConfirmar = document.getElementById("btnConfirmar");
  if (btnConfirmar) btnConfirmar.onclick = submitCobro;

  var btnLiberar = document.getElementById("btnLiberar");
  if (btnLiberar) btnLiberar.onclick = submitLiberar;

  var btnAnular = document.getElementById("btnAnular");
  if (btnAnular) btnAnular.onclick = submitAnular;

  var btnReversar = document.getElementById("btnReversar");
  if (btnReversar) btnReversar.onclick = submitReversar;

  var pedidosHeader = document.getElementById("pedidosHeader");
  if (pedidosHeader) {
    pedidosHeader.onclick = function() {
      var body = document.getElementById("pedidosBody");
      var toggle = document.getElementById("pedidosToggle");
      if (body.classList.contains("open")) { body.classList.remove("open"); toggle.classList.remove("open"); }
      else { body.classList.add("open"); toggle.classList.add("open"); }
    };
  }

  var itemsHeader = document.getElementById("itemsHeader");
  if (itemsHeader) {
    itemsHeader.onclick = function() {
      var body = document.getElementById("itemsBody");
      var toggle = document.getElementById("itemsToggle");
      if (body.classList.contains("open")) { body.classList.remove("open"); toggle.classList.remove("open"); }
      else { body.classList.add("open"); toggle.classList.add("open"); }
    };
  }
}

// Inicializar al cargar
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
