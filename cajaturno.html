<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FastBurguer — Turno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}

/* ===== LOADER ===== */
#load{position:fixed;inset:0;background:rgba(10,10,10,0.95);display:none;justify-content:center;align-items:center;z-index:9999;flex-direction:column;gap:12px}
#load.show{display:flex}
.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,0.08);border-top-color:#f7931e;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== TOAST ===== */
#toast{position:fixed;top:16px;right:16px;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;display:none;backdrop-filter:blur(10px);max-width:320px;animation:toastIn 0.3s ease}
#toast.ok{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22c55e}
#toast.err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ===== ALERTA CUSTOM CENTRADA ===== */
#customAlertModal{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(8px)}
#customAlertModal.show{display:flex}
.alertBox{background:linear-gradient(180deg,#1a1a1a,#0f0f0f);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.8);animation:alertEnter 0.35s cubic-bezier(0.4,0,0.2,1)}
@keyframes alertEnter{from{opacity:0;transform:scale(0.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.alertIcon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.alertIcon.error{background:rgba(59,130,246,0.15);color:#60a5fa;box-shadow:0 0 20px rgba(59,130,246,0.2)}
.alertIcon.success{background:rgba(34,197,94,0.15);color:#4ade80;box-shadow:0 0 20px rgba(34,197,94,0.2)}
.alertTitle{font-size:18px;font-weight:800;color:#fff;margin-bottom:8px}
.alertBody{font-size:13px;color:#9ca3af;margin-bottom:20px;line-height:1.5}
.alertBtn{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:0.2s;border:none;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff}
.alertBtn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,107,53,0.3)}
.alertBtn:active{transform:scale(0.97)}

/* ===== HEADER ===== */
.header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:100}
.hBtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;background:rgba(255,255,255,0.05);border:none;color:#fff}
.hBtn:active{transform:scale(0.93);background:rgba(255,107,53,0.15)}
.hTitle{font-size:16px;font-weight:800;color:#f7931e;letter-spacing:-0.3px}
.hSub{font-size:11px;color:#6b7280;font-weight:500}

/* ===== CONTENT ===== */
.content{padding:70px 14px 24px;min-height:100vh;max-width:800px;margin:0 auto}

/* ===== TURNO INFO CARD ===== */
.turnoCard{background:linear-gradient(135deg,rgba(255,107,53,0.08),rgba(247,147,30,0.04));border:1px solid rgba(255,107,53,0.15);border-radius:16px;padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.turnoCard::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(255,107,53,0.1),transparent 70%);pointer-events:none}
.turnoHeader{display:flex;justify-content:space-between;align-items:start;margin-bottom:12px}
.turnoNro{font-size:18px;font-weight:800;color:#f7931e}
.turnoStatus{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}
.turnoStatus.abierto{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.turnoStatus.cerrado{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.turnoRow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03)}
.turnoRow:last-child{border-bottom:none}
.turnoLabel{color:#9ca3af}
.turnoValue{color:#fff;font-weight:600}

/* ===== KPIs ===== */
.kpiRow{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.kpiChip{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 8px;text-align:center;backdrop-filter:blur(10px);animation:kpiIn 0.4s ease both}
.kpiChip:nth-child(1){animation-delay:0.05s}
.kpiChip:nth-child(2){animation-delay:0.1s}
.kpiChip:nth-child(3){animation-delay:0.15s}
.kpiChip:nth-child(4){animation-delay:0.2s}
@keyframes kpiIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kpiValue{font-size:18px;font-weight:800;color:#fff;line-height:1}
.kpiLabel{font-size:9px;color:#9ca3af;margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}
.kpiValue.positive{color:#4ade80}
.kpiValue.negative{color:#f87171}

/* ===== RESUMEN TABLE ===== */
.resumenSection{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:16px;margin-bottom:16px}
.resumenTitle{font-size:14px;font-weight:700;color:#f7931e;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.resumenRow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.resumenRow:last-child{border-bottom:none}
.resumenRow.total{padding-top:14px;margin-top:4px;border-top:2px solid rgba(255,107,53,0.2);border-bottom:none}
.resumenDesc{display:flex;flex-direction:column;gap:2px}
.resumenFp{font-size:13px;font-weight:600;color:#fff}
.resumenCant{font-size:11px;color:#9ca3af}
.resumenMonto{font-size:14px;font-weight:700;color:#f7931e}
.resumenMonto.total{font-size:18px}

/* ===== EMPTY STATE ===== */
.emptyState{text-align:center;padding:50px 20px;color:#6b7280}
.emptyStateIcon{font-size:48px;margin-bottom:12px;opacity:0.5}
.emptyStateTitle{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px}
.emptyStateBody{font-size:13px;color:#9ca3af;margin-bottom:20px;line-height:1.5}

/* ===== ACTION BUTTONS ===== */
.actionBtn{width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:0.2s;border:none;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.actionBtn:hover{transform:translateY(-1px)}
.actionBtn:active{transform:scale(0.97)}
.actionBtn.primary{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff}
.actionBtn.primary:hover{box-shadow:0 8px 24px rgba(255,107,53,0.3)}
.actionBtn.primary:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.actionBtn.danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.actionBtn.danger:hover{background:rgba(239,68,68,0.25)}
.actionBtn.secondary{background:rgba(255,255,255,0.06);color:#9ca3af;border:1px solid rgba(255,255,255,0.08)}
.actionBtn.secondary:hover{background:rgba(255,255,255,0.1);color:#fff}
.actionBtn.success{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.actionBtn.success:hover{background:rgba(34,197,94,0.25)}

/* ===== MODAL ===== */
.modalOverlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(8px)}
.modalOverlay.show{display:flex}
.modalBox{background:linear-gradient(180deg,#1a1a1a,#0f0f0f);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.8);animation:modalEnter 0.35s cubic-bezier(0.4,0,0.2,1);max-height:90vh;overflow-y:auto}
@keyframes modalEnter{from{opacity:0;transform:scale(0.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modalTitle{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
.modalSub{font-size:12px;color:#9ca3af;margin-bottom:20px}
.modalField{margin-bottom:14px}
.modalLabel{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block}
.modalInput{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;color:#fff;font-size:14px;outline:none;transition:0.3s;font-family:'Inter',sans-serif}
.modalInput:focus{border-color:rgba(255,107,53,0.4);box-shadow:0 0 0 3px rgba(255,107,53,0.08)}
.modalInput::placeholder{color:#4b5563}
.modalTextarea{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;color:#fff;font-size:14px;outline:none;resize:vertical;min-height:80px;font-family:'Inter',sans-serif}
.modalTextarea:focus{border-color:rgba(255,107,53,0.4);box-shadow:0 0 0 3px rgba(255,107,53,0.08)}
.modalTextarea::placeholder{color:#4b5563}
.modalActions{display:flex;gap:10px;margin-top:20px}
.modalActions .actionBtn{flex:1;margin-bottom:0}

/* ===== PREVIEW DIFF ===== */
.diffPreview{display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;margin-bottom:14px}
.diffLabel{font-size:12px;color:#9ca3af}
.diffValue{font-size:16px;font-weight:800}
.diffValue.ok{color:#4ade80}
.diffValue.bad{color:#f87171}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,107,53,0.3);border-radius:4px}
</style>
</head>
<body>

<div id="load"><div class="spin"></div><div style="color:#9ca3af;font-size:13px">Cargando turno...</div></div>
<div id="toast"></div>

<!-- ALERTA CUSTOM CENTRADA -->
<div id="customAlertModal">
  <div class="alertBox">
    <div class="alertIcon" id="alertIcon"></div>
    <div class="alertTitle" id="alertTitle"></div>
    <div class="alertBody" id="alertBody"></div>
    <button class="alertBtn" id="alertBtn" type="button"></button>
  </div>
</div>

<!-- MODAL ABRIR TURNO -->
<div class="modalOverlay" id="modalAbrir">
  <div class="modalBox">
    <div class="modalTitle">🔓 Abrir Turno</div>
    <div class="modalSub">Ingrese los datos para abrir un nuevo turno de caja</div>
    <div class="modalField">
      <label class="modalLabel">Código de Usuario</label>
      <input type="text" class="modalInput" id="abrirCodUsuario" placeholder="Ej: USR001">
    </div>
    <div class="modalField">
      <label class="modalLabel">Nombre de Usuario</label>
      <input type="text" class="modalInput" id="abrirDesUsuario" placeholder="Ej: Maria Perez">
    </div>
    <div class="modalField">
      <label class="modalLabel">Monto de Apertura</label>
      <input type="number" class="modalInput" id="abrirMonto" placeholder="0.00" step="0.01">
    </div>
    <div class="modalActions">
      <button class="actionBtn secondary" onclick="closeModal('modalAbrir')" type="button">Cancelar</button>
      <button class="actionBtn primary" id="btnConfirmarAbrir" onclick="submitAbrir()" type="button">Abrir Turno</button>
    </div>
  </div>
</div>

<!-- MODAL CERRAR TURNO -->
<div class="modalOverlay" id="modalCerrar">
  <div class="modalBox">
    <div class="modalTitle">🔒 Cerrar Turno</div>
    <div class="modalSub" id="cerrarSub">Confirme el arqueo para cerrar el turno</div>

    <div class="diffPreview">
      <div>
        <div class="diffLabel">Total Cobrado</div>
        <div class="diffValue" id="previewCobrado" style="color:#f7931e">$0.00</div>
      </div>
      <div style="text-align:right">
        <div class="diffLabel">Monto Apertura</div>
        <div class="diffValue" id="previewApertura" style="color:#fff">$0.00</div>
      </div>
    </div>

    <div class="modalField">
      <label class="modalLabel">Monto de Arqueo</label>
      <input type="number" class="modalInput" id="cerrarMonto" placeholder="0.00" step="0.01" oninput="calcDiffCierre()">
    </div>

    <div class="diffPreview" style="margin-bottom:10px">
      <div class="diffLabel">Diferencia</div>
      <div class="diffValue" id="previewDiferencia">$0.00</div>
    </div>

    <div class="modalField">
      <label class="modalLabel">Observaciones (opcional)</label>
      <textarea class="modalTextarea" id="cerrarObs" placeholder="Ej: Faltan $5 en efectivo..."></textarea>
    </div>

    <div class="modalActions">
      <button class="actionBtn secondary" onclick="closeModal('modalCerrar')" type="button">Cancelar</button>
      <button class="actionBtn danger" id="btnConfirmarCerrar" onclick="submitCerrar()" type="button">Cerrar Turno</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="hBtn" id="btnBack" type="button">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div>
      <div class="hTitle">Turno</div>
      <div class="hSub" id="headerSub">--</div>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="mainContent">
  <!-- Render dinámico -->
</div>

<script>
var API="https://script.google.com/macros/s/AKfycbxqlBT5nM5UuJe-5IAXu6YewZxeV5r9FoXBkMYwPD4xkK1llpxakpExC6DspQvnOI6Vmw/exec";
var TURNO=null,RESUMEN=null;

function showLoad(){document.getElementById("load").className="show"}
function hideLoad(){document.getElementById("load").className=""}
function toast(m,tipo){var t=document.getElementById("toast");t.textContent=m;t.className=tipo||"ok";t.style.display="block";setTimeout(function(){t.style.display="none"},4000)}

function mostrarAlerta(tipo,titulo,mensaje,callback,btnText){
  btnText=btnText||"Entendido";
  var modal=document.getElementById("customAlertModal");
  var icon=document.getElementById("alertIcon");
  var title=document.getElementById("alertTitle");
  var body=document.getElementById("alertBody");
  var btn=document.getElementById("alertBtn");
  title.textContent=titulo;
  body.textContent=mensaje;
  btn.textContent=btnText;
  if(tipo==="error"){
    icon.className="alertIcon error";
    icon.innerHTML='<svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>';
  }else{
    icon.className="alertIcon success";
    icon.innerHTML='<svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
  }
  btn.onclick=function(){modal.classList.remove("show");if(callback)callback()};
  modal.classList.add("show");
}

function apiGet(action,params){var url=API+"?action="+action+"&_cb="+Date.now();if(params)for(var key in params)url+="&"+key+"="+encodeURIComponent(params[key]);return fetch(url).then(function(r){return r.json()})}
function apiPost(d){return fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(d)}).then(function(r){return r.json()})}

function formatMoney(v){var val=parseFloat(v)||0;return "$"+val.toFixed(2)}
function formatTime(h){if(!h)return"--:--";var s=String(h);if(s.indexOf(":")>-1)return s.substring(0,5);var n=parseFloat(s);if(!isNaN(n)){var hh=Math.floor(n*24);var mm=Math.round((n*24-hh)*60);return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0")}return"--:--"}
function formatDate(d){if(!d)return"--/--/----";var s=String(d);if(s.indexOf("-")>-1){var p=s.split("-");if(p.length===3)return p[2]+"/"+p[1]+"/"+p[0]}return s}

function init(){
  showLoad();
  loadTurno().then(function(){
    if(TURNO&&TURNO.CodTurno){
      return loadResumen().then(function(){render();hideLoad()});
    }else{
      render();hideLoad();
    }
  }).catch(function(e){hideLoad();renderSinTurno();});
}

function loadTurno(){return apiGet("getTurnoActivo",{}).then(function(r){if(r.success){TURNO=r.turno;updateHeader()}}).catch(function(e){TURNO=null;})}
function loadResumen(){if(!TURNO||!TURNO.CodTurno)return Promise.resolve();return apiGet("getResumenCaja",{codTurno:TURNO.CodTurno}).then(function(r){if(r.success){RESUMEN=r}}).catch(function(e){RESUMEN=null;})}

function updateHeader(){var el=document.getElementById("headerSub");if(TURNO&&TURNO.CodTurno){el.textContent="Turno "+TURNO.CodTurno+" — Abierto"}else{el.textContent="Sin turno activo"}}

function render(){var container=document.getElementById("mainContent");if(TURNO&&TURNO.CodTurno){container.innerHTML=renderConTurno()}else{container.innerHTML=renderSinTurnoHTML()}attachEvents();}

function renderSinTurnoHTML(){
  var html='<div class="emptyState">';
  html+='<div class="emptyStateIcon">🔒</div>';
  html+='<div class="emptyStateTitle">Sin Turno Activo</div>';
  html+='<div class="emptyStateBody">No hay un turno de caja abierto actualmente. Abra uno nuevo para comenzar a operar.</div>';
  html+='<button class="actionBtn success" id="btnAbrir" type="button" style="max-width:280px;margin:0 auto">🔓 Abrir Turno</button>';
  html+='<button class="actionBtn secondary" id="btnBackMenu" type="button" style="max-width:280px;margin:10px auto 0">↩️ Regresar a Caja</button>';
  html+='</div>';
  return html;
}

function renderConTurno(){
  var t=TURNO;
  var r=RESUMEN||{};
  var resumenArr=r.resumen||[];
  var totalGeneral=parseFloat(r.totalGeneral)||0;
  var cantidadPagos=parseInt(r.cantidadPagos)||0;
  var montoApertura=parseFloat(t.MontoApertura)||0;
  var fecha=formatDate(t.FechaApertura);
  var hora=formatTime(t.HoraApertura);

  var html='';

  // Turno info card
  html+='<div class="turnoCard">';
  html+='<div class="turnoHeader"><div class="turnoNro">'+t.CodTurno+'</div><span class="turnoStatus abierto">Abierto</span></div>';
  html+='<div class="turnoRow"><span class="turnoLabel">Nro Caja</span><span class="turnoValue">'+(t.NroCaja||"N/A")+'</span></div>';
  html+='<div class="turnoRow"><span class="turnoLabel">Cajero</span><span class="turnoValue">'+(t.DesUsuario||t.CodUsuario||"N/A")+'</span></div>';
  html+='<div class="turnoRow"><span class="turnoLabel">Fecha Apertura</span><span class="turnoValue">'+fecha+' '+hora+'</span></div>';
  html+='<div class="turnoRow"><span class="turnoLabel">Monto Apertura</span><span class="turnoValue">'+formatMoney(montoApertura)+'</span></div>';
  html+='</div>';

  // KPIs
  html+='<div class="kpiRow">';
  html+='<div class="kpiChip"><div class="kpiValue">'+formatMoney(totalGeneral)+'</div><div class="kpiLabel">Total Cobrado</div></div>';
  html+='<div class="kpiChip"><div class="kpiValue">'+cantidadPagos+'</div><div class="kpiLabel">Pagos</div></div>';
  html+='<div class="kpiChip"><div class="kpiValue">'+formatMoney(montoApertura)+'</div><div class="kpiLabel">Apertura</div></div>';
  html+='<div class="kpiChip"><div class="kpiValue">'+formatMoney(totalGeneral+montoApertura)+'</div><div class="kpiLabel">En Caja</div></div>';
  html+='</div>';

  // Resumen por forma de pago
  html+='<div class="resumenSection">';
  html+='<div class="resumenTitle">📊 Resumen por Forma de Pago</div>';
  if(resumenArr.length===0){
    html+='<div style="text-align:center;color:#6b7280;padding:20px;font-size:13px">Sin pagos registrados en este turno</div>';
  }else{
    resumenArr.forEach(function(item){
      html+='<div class="resumenRow">';
      html+='<div class="resumenDesc"><div class="resumenFp">'+(item.desPago||item.codFormaPago)+'</div><div class="resumenCant">'+item.cantidad+' pago(s)</div></div>';
      html+='<div class="resumenMonto">'+formatMoney(item.total)+'</div>';
      html+='</div>';
    });
    html+='<div class="resumenRow total">';
    html+='<div class="resumenDesc"><div class="resumenFp" style="font-weight:800">TOTAL GENERAL</div></div>';
    html+='<div class="resumenMonto total">'+formatMoney(totalGeneral)+'</div>';
    html+='</div>';
  }
  html+='</div>';

  // Actions
  html+='<button class="actionBtn danger" id="btnCerrar" type="button">🔒 Cerrar Turno</button>';
  html+='<button class="actionBtn secondary" id="btnVerPedidos" type="button">📋 Ver Pedidos del Turno</button>';
  html+='<button class="actionBtn secondary" id="btnBackMenu2" type="button">↩️ Regresar a Caja</button>';

  return html;
}

function attachEvents(){
  document.getElementById("btnBack").addEventListener("click",function(){window.location.href="caja.html"});
  var btnAbrir=document.getElementById("btnAbrir");
  if(btnAbrir)btnAbrir.addEventListener("click",function(){openModal("modalAbrir")});
  var btnCerrar=document.getElementById("btnCerrar");
  if(btnCerrar)btnCerrar.addEventListener("click",function(){openModalCerrar()});
  var btnVer=document.getElementById("btnVerPedidos");
  if(btnVer)btnVer.addEventListener("click",function(){window.location.href="caja.html"});
  var b1=document.getElementById("btnBackMenu");
  if(b1)b1.addEventListener("click",function(){window.location.href="caja.html"});
  var b2=document.getElementById("btnBackMenu2");
  if(b2)b2.addEventListener("click",function(){window.location.href="caja.html"});
}

function openModal(id){document.getElementById(id).classList.add("show")}
function closeModal(id){document.getElementById(id).classList.remove("show")}

function openModalCerrar(){
  if(!TURNO||!TURNO.CodTurno)return;
  var r=RESUMEN||{};
  var totalGeneral=parseFloat(r.totalGeneral)||0;
  var montoApertura=parseFloat(TURNO.MontoApertura)||0;
  document.getElementById("previewCobrado").textContent=formatMoney(totalGeneral);
  document.getElementById("previewApertura").textContent=formatMoney(montoApertura);
  document.getElementById("cerrarMonto").value="";
  document.getElementById("cerrarObs").value="";
  calcDiffCierre();
  openModal("modalCerrar");
}

function calcDiffCierre(){
  var r=RESUMEN||{};
  var totalGeneral=parseFloat(r.totalGeneral)||0;
  var montoApertura=parseFloat(TURNO.MontoApertura)||0;
  var arqueo=parseFloat(document.getElementById("cerrarMonto").value)||0;
  var diff=arqueo-montoApertura-totalGeneral;
  var el=document.getElementById("previewDiferencia");
  el.textContent=formatMoney(diff);
  if(Math.abs(diff)<0.01){el.className="diffValue ok"}
  else if(diff<0){el.className="diffValue bad"}
  else{el.className="diffValue ok"}
}

function submitAbrir(){
  var cod=document.getElementById("abrirCodUsuario").value.trim();
  var des=document.getElementById("abrirDesUsuario").value.trim();
  var monto=parseFloat(document.getElementById("abrirMonto").value)||0;
  if(!cod){mostrarAlerta("error","Campo requerido","Ingrese el código de usuario.");return}
  if(!des){mostrarAlerta("error","Campo requerido","Ingrese el nombre de usuario.");return}
  if(monto<0){mostrarAlerta("error","Monto inválido","El monto de apertura no puede ser negativo.");return}
  showLoad();
  apiPost({action:"abrirTurno",codUsuario:cod,desUsuario:des,montoApertura:monto}).then(function(r){
    hideLoad();
    if(r.success){
      mostrarAlerta("success","Turno Abierto",r.message||"Turno abierto correctamente.",function(){closeModal("modalAbrir");init();},"Aceptar");
    }else{
      mostrarAlerta("error","Error",r.error||"No se pudo abrir el turno.");
    }
  }).catch(function(e){hideLoad();mostrarAlerta("error","Error de red",e.message)});
}

function submitCerrar(){
  if(!TURNO||!TURNO.CodTurno){mostrarAlerta("error","Error","No hay turno activo.");return}
  var monto=parseFloat(document.getElementById("cerrarMonto").value);
  if(isNaN(monto)){mostrarAlerta("error","Campo requerido","Ingrese el monto de arqueo.");return}
  var obs=document.getElementById("cerrarObs").value.trim();
  showLoad();
  apiPost({action:"cerrarTurno",codTurno:TURNO.CodTurno,montoArqueo:monto,observaciones:obs}).then(function(r){
    hideLoad();
    if(r.success){
      var msg=r.message||"Turno cerrado correctamente.";
      if(r.diferencia!==undefined){msg+=" Diferencia: "+formatMoney(r.diferencia)+"."}
      mostrarAlerta("success","Turno Cerrado",msg,function(){closeModal("modalCerrar");init();},"Aceptar");
    }else{
      mostrarAlerta("error","Error",r.error||"No se pudo cerrar el turno.");
    }
  }).catch(function(e){hideLoad();mostrarAlerta("error","Error de red",e.message)});
}

document.addEventListener("DOMContentLoaded",init);
</script>
