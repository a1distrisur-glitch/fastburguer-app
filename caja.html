<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FastBurguer — Caja</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.hidden{display:none!important}

/* ===== LOADER ===== */
#load{position:fixed;inset:0;background:rgba(10,10,10,0.95);display:none;justify-content:center;align-items:center;z-index:9999;flex-direction:column;gap:12px}
#load.show{display:flex}
.spin{width:40px;height:40px;border:3px solid rgba(255,255,255,0.08);border-top-color:#f7931e;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== TOAST (top-right, legacy) ===== */
#toast{position:fixed;top:16px;right:16px;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;display:none;backdrop-filter:blur(10px);max-width:320px;animation:toastIn 0.3s ease}
#toast.ok{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22c55e}
#toast.err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
#toast.info{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3);color:#3b82f6}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ===== ALERTA CUSTOM CENTRADA (heredado de index.html) ===== */
#customAlertModal{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.85);display:none;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(8px)}
#customAlertModal.show{display:flex}
.alertBox{background:linear-gradient(180deg,#1a1a1a,#0f0f0f);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.8);animation:alertEnter 0.35s cubic-bezier(0.4,0,0.2,1)}
@keyframes alertEnter{from{opacity:0;transform:scale(0.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.alertIcon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.alertIcon.error{background:rgba(59,130,246,0.15);color:#60a5fa;box-shadow:0 0 20px rgba(59,130,246,0.2)}
.alertIcon.success{background:rgba(34,197,94,0.15);color:#4ade80;box-shadow:0 0 20px rgba(34,197,94,0.2)}
.alertTitle{font-size:18px;font-weight:800;color:#fff;margin-bottom:8px}
.alertBody{font-size:13px;color:#9ca3af;margin-bottom:20px;line-height:1.5}
.alertBtn{width:100%;padding:12px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:0.2s;border:none;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff}
.alertBtn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(255,107,53,0.3)}
.alertBtn:active{transform:scale(0.97)}

/* ===== HEADER ===== */
.header{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:100}
.hBtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;background:rgba(255,255,255,0.05);border:none;color:#fff}
.hBtn:active{transform:scale(0.93);background:rgba(255,107,53,0.15)}
.hTitle{font-size:16px;font-weight:800;color:#f7931e;letter-spacing:-0.3px}
.hTurno{background:rgba(34,197,94,0.15);color:#4ade80;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin-left:8px;border:1px solid rgba(34,197,94,0.2)}
.hTurno.closed{background:rgba(239,68,68,0.15);color:#ef4444;border-color:rgba(239,68,68,0.2)}
.turnoBtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;background:rgba(255,255,255,0.05);border:none;color:#fff}
.turnoBtn:hover{background:rgba(255,255,255,0.1)}
.turnoBtn:active{transform:scale(0.93)}
.turnoBtn.open{color:#4ade80;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2)}
.turnoBtn.open:hover{background:rgba(34,197,94,0.2)}
.turnoBtn.close{color:#a16207;background:rgba(161,98,7,0.1);border:1px solid rgba(161,98,7,0.2)}
.turnoBtn.close:hover{background:rgba(161,98,7,0.2)}

/* ===== CONTENT ===== */
.content{padding:70px 14px 24px;min-height:100vh;max-width:800px;margin:0 auto}

/* ===== SEARCH ===== */
.searchBox{position:relative;margin-bottom:14px}
.searchInput{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px 16px 12px 40px;font-size:14px;color:#fff;outline:none;transition:0.3s}
.searchInput:focus{border-color:rgba(255,107,53,0.4);box-shadow:0 0 0 3px rgba(255,107,53,0.08)}
.searchInput::placeholder{color:#4b5563}
.searchIcon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#4b5563;width:18px;height:18px}

/* ===== FILTERS ===== */
.filterRow{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filterChip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:0.2s;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#9ca3af}
.filterChip:hover{background:rgba(255,255,255,0.06)}
.filterChip.active{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border-color:transparent}

/* ===== KPIs ===== */
.kpiRow{display:flex;gap:8px;margin-bottom:14px}
.kpiChip{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:10px 8px;text-align:center;backdrop-filter:blur(10px)}
.kpiValue{font-size:16px;font-weight:800;color:#fff;line-height:1}
.kpiLabel{font-size:9px;color:#9ca3af;margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px}

/* ===== SECTION TITLE ===== */
.secTitle{font-size:13px;font-weight:700;color:#f7931e;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.secTitle span{color:#9ca3af;font-weight:500}

/* ===== ORDER CARDS ===== */
.orderList{display:flex;flex-direction:column;gap:8px}
.orderCard{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:10px;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden}
.orderCard:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,107,53,0.15);transform:translateY(-1px)}
.orderCard:active{transform:scale(0.98)}
.orderHeader{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
.orderNro{font-size:14px;font-weight:800;color:#f7931e}
.orderTime{font-size:11px;color:#6b7280;font-weight:500}
.orderClient{font-size:13px;font-weight:600;color:#fff;margin-bottom:2px}
.orderPhone{font-size:11px;color:#9ca3af;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.orderItems{font-size:11px;color:#9ca3af;margin-bottom:6px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.orderFooter{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.orderTotal{font-size:14px;font-weight:800;color:#fff}
.orderType{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:0.3px}
.orderType.delivery{background:rgba(59,130,246,0.15);color:#60a5fa}
.orderType.pickup{background:rgba(34,197,94,0.15);color:#4ade80}
.orderType.sitio{background:rgba(168,85,247,0.15);color:#c084fc}

/* ===== STATUS CHIPS ===== */
.statusRow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.statusChip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:0.3px}
.statusChip.pendientedepago{background:rgba(249,115,22,0.18);color:#fbbf24;border:1px solid rgba(249,115,22,0.25)}
.statusChip.pendiente{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
.statusChip.enpreparacion{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
.statusChip.listo{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.statusChip.entregado{background:rgba(107,114,128,0.15);color:#9ca3af;border:1px solid rgba(107,114,128,0.2)}
.statusChip.pagado{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.statusChip.nopagado{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.statusChip.anulado{background:rgba(239,68,68,0.18);color:#f87171;border:1px solid rgba(239,68,68,0.25)}

/* ===== CARD ACTIONS ===== */
.cardActions{display:flex;gap:6px;flex-wrap:wrap}
.cardBtn{flex:1;min-width:80px;padding:8px 6px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:0.2s;border:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px}
.cardBtn:hover{transform:translateY(-1px)}
.cardBtn:active{transform:scale(0.95)}
.cardBtn.primary{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff}
.cardBtn.primary:hover{box-shadow:0 4px 12px rgba(255,107,53,0.3)}
.cardBtn.secondary{background:rgba(255,255,255,0.06);color:#d1d5db;border:1px solid rgba(255,255,255,0.08)}
.cardBtn.secondary:hover{background:rgba(255,255,255,0.1)}
.cardBtn.success{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.cardBtn.success:hover{background:rgba(34,197,94,0.25)}
.cardBtn.danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.cardBtn.danger:hover{background:rgba(239,68,68,0.25)}
.cardBtn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}
.cardBtn:disabled:hover{transform:none!important;box-shadow:none!important}

/* ===== EMPTY STATE ===== */
.emptyState{text-align:center;padding:40px 20px;color:#6b7280}
.emptyStateIcon{font-size:36px;margin-bottom:8px;opacity:0.5}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,107,53,0.3);border-radius:4px}

/* ===== DETAIL PANEL (slide derecha) ===== */
#detailPanel{position:fixed;top:0;right:0;width:100%;max-width:420px;height:100vh;background:#0f0f0f;z-index:200;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);border-left:1px solid rgba(255,255,255,0.08);display:flex;flex-direction:column;overflow:hidden}
#detailPanel.open{transform:translateX(0)}
#detailOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:199;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(4px)}
#detailOverlay.show{opacity:1;pointer-events:auto}
.detailHeader{padding:16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02)}
.detailBody{flex:1;overflow-y:auto;padding:16px}
.detailFooter{padding:16px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02)}
.detailSection{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:12px}
.detailSectionTitle{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.detailRow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.detailRow:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.03)}
.detailLabel{color:#9ca3af}
.detailValue{color:#fff;font-weight:600}
.detailValue.price{color:#f7931e;font-weight:800}
.itemRow{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.itemRow:last-child{border-bottom:none}
.itemQty{width:24px;height:24px;border-radius:6px;background:rgba(255,107,53,0.15);color:#f7931e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.itemInfo{flex:1}
.itemName{font-size:13px;font-weight:600;color:#fff}
.itemCat{font-size:11px;color:#9ca3af}
.itemPrice{font-size:13px;font-weight:700;color:#f7931e;text-align:right;white-space:nowrap}

/* ===== RESUMEN BUTTON ===== */
.resumenBtn{width:100%;padding:12px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:0.2s;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#9ca3af;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.resumenBtn:hover{background:rgba(255,255,255,0.06);color:#fff}

/* ===== REFRESH INDICATOR ===== */
.refreshIndicator{position:fixed;top:56px;left:50%;transform:translateX(-50%);z-index:99;padding:6px 14px;background:rgba(10,10,10,0.9);border:1px solid rgba(255,107,53,0.2);border-radius:20px;font-size:11px;font-weight:600;color:#f7931e;display:none;align-items:center;gap:6px;backdrop-filter:blur(10px)}
.refreshIndicator.show{display:flex}
.refreshDot{width:6px;height:6px;border-radius:50%;background:#f7931e;animation:blink 1.5s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== SOUND TOGGLE ===== */
.soundToggle{position:fixed;bottom:20px;right:14px;z-index:95;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;backdrop-filter:blur(10px)}
.soundToggle:hover{background:rgba(255,255,255,0.1);color:#fff}
.soundToggle.on{color:#f7931e;border-color:rgba(255,107,53,0.3)}
</style>
</head>
<body>

<div id="load"><div class="spin"></div><div style="color:#9ca3af;font-size:13px">Cargando caja...</div></div>
<div id="toast"></div>
<div id="refreshIndicator" class="refreshIndicator"><div class="refreshDot"></div>Actualizando...</div>

<!-- ALERTA CUSTOM CENTRADA -->
<div id="customAlertModal">
  <div class="alertBox">
    <div class="alertIcon" id="alertIcon"></div>
    <div class="alertTitle" id="alertTitle"></div>
    <div class="alertBody" id="alertBody"></div>
    <button class="alertBtn" id="alertBtn" type="button"></button>
  </div>
</div>

<!-- DETAIL PANEL -->
<div id="detailOverlay"></div>
<div id="detailPanel">
  <div class="detailHeader">
    <div style="display:flex;align-items:center;gap:10px">
      <button class="hBtn" id="detailBackBtn" style="width:34px;height:34px" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <div>
        <div style="font-size:14px;font-weight:800;color:#fff" id="detailNro">PED00000</div>
        <div style="font-size:11px;color:#9ca3af" id="detailHora">--:--</div>
      </div>
    </div>
    <span class="statusChip pendientedepago" id="detailStatus">Pendiente de Pago</span>
  </div>
  <div class="detailBody" id="detailBody"></div>
  <div class="detailFooter" id="detailFooter"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="hBtn" id="btnBack" type="button">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div class="hTitle">Caja</div>
    <span class="hTurno" id="headerTurno">Sin Turno</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="hBtn" id="btnPedidos" type="button" title="Ver Pedidos">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
    </button>
    <button class="turnoBtn open" id="btnTurnoAction" type="button" title="Abrir/Cerrar Turno">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
    </button>
    <button class="hBtn" id="btnRefresh" type="button" title="Actualizar">
      <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    </button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="searchBox">
    <svg class="searchIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input type="text" class="searchInput" id="searchInput" placeholder="Buscar por Nro, Cliente o Telefono...">
  </div>

  <div class="filterRow">
    <button class="filterChip active" data-filter="todos" type="button">Todos</button>
    <button class="filterChip" data-filter="pendientepago" type="button">Pendiente de Pago</button>
    <button class="filterChip" data-filter="porcobrar" type="button">Por Cobrar</button>
    <button class="filterChip" data-filter="pagado" type="button">Pagado</button>
    <button class="filterChip" data-filter="anulado" type="button">Anulado</button>
  </div>

  <div class="kpiRow">
    <div class="kpiChip"><div class="kpiValue" id="kpiCobrado">$0.00</div><div class="kpiLabel">Cobrado</div></div>
    <div class="kpiChip"><div class="kpiValue" id="kpiPagos">0</div><div class="kpiLabel">Pagos</div></div>
    <div class="kpiChip"><div class="kpiValue" id="kpiPorCobrar">0</div><div class="kpiLabel">Por Cobrar</div></div>
  </div>

  <div class="secTitle" id="secTitle">📋 Todos los Pedidos <span id="countPorCobrar">(0)</span></div>
  <div class="orderList" id="listaPedidos">
    <div class="emptyState"><div class="emptyStateIcon">📋</div><div style="font-size:13px">Sin pedidos por cobrar</div></div>
  </div>

  <button class="resumenBtn" id="btnResumen" type="button">
    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
    Ver Resumen del Turno
  </button>
</div>

<button class="soundToggle on" id="soundToggle" type="button" title="Sonido de alertas">
  <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
</button>

<script>
var API="https://script.google.com/macros/s/AKfycbxqlBT5nM5UuJe-5IAXu6YewZxeV5r9FoXBkMYwPD4xkK1llpxakpExC6DspQvnOI6Vmw/exec";
var FILTRO_ACTUAL="todos";
var TURNO=null,PEDIDOS=[],FORMAS_PAGO=[],CONFIG={},TASAS={},BUSQUEDA="",AUTO_REFRESH=null,SOUND_ON=true,PEDIDO_ACTUAL=null;

function showLoad(){document.getElementById("load").className="show"}
function hideLoad(){document.getElementById("load").className=""}
function toast(m,tipo){var t=document.getElementById("toast");t.textContent=m;t.className=tipo||"ok";t.style.display="block";setTimeout(function(){t.style.display="none"},4000)}

/* ===== ALERTA CUSTOM CENTRADA ===== */
function mostrarAlerta(tipo,titulo,mensaje,callback,btnText){
  btnText=btnText||"Entendido";
  var modal=document.getElementById("customAlertModal");
  var icon=document.getElementById("alertIcon");
  var title=document.getElementById("alertTitle");
  var body=document.getElementById("alertBody");
  var btn=document.getElementById("alertBtn");
  title.textContent=titulo;
  body.textContent=mensaje;
  btn.textContent=btnText;
  if(tipo==="error"){
    icon.className="alertIcon error";
    icon.innerHTML='<svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>';
  }else{
    icon.className="alertIcon success";
    icon.innerHTML='<svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>';
  }
  btn.onclick=function(){modal.classList.remove("show");if(callback)callback()};
  modal.classList.add("show");
}

function apiGet(action,params){var url=API+"?action="+action+"&_cb="+Date.now();if(params)for(var key in params)url+="&"+key+"="+encodeURIComponent(params[key]);return fetch(url).then(function(r){return r.json()})}
function apiPost(d){return fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(d)}).then(function(r){return r.json()})}

function formatMoney(v,codTasa){var val=parseFloat(v)||0;var sym="$";if(codTasa==="T001"||codTasa==="T006")sym="Bs ";else if(codTasa==="T002")sym="$";else if(codTasa==="T003")sym="EUR ";else if(codTasa==="T004")sym="BN ";return sym+val.toFixed(2)}
function formatTime(h){if(!h)return"--:--";var s=String(h);if(s.indexOf(":")>-1)return s.substring(0,5);var n=parseFloat(s);if(!isNaN(n)){var hh=Math.floor(n*24);var mm=Math.round((n*24-hh)*60);return String(hh).padStart(2,"0")+":"+String(mm).padStart(2,"0")}return"--:--"}
function getTipoLabel(t){t=String(t||"").toLowerCase();if(t==="delivery")return"Delivery";if(t==="pickup")return"Pick Up";if(t==="sitio")return"En Sitio";return t||"N/A"}
function getTipoClass(t){t=String(t||"").toLowerCase();if(t==="delivery")return"delivery";if(t==="pickup")return"pickup";if(t==="sitio")return"sitio";return"pickup"}

function playChing(){if(!SOUND_ON)return;try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var osc=ctx.createOscillator();var gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=1200;osc.type="sine";gain.gain.setValueAtTime(0.15,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);setTimeout(function(){var o2=ctx.createOscillator();var g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.value=1600;o2.type="sine";g2.gain.setValueAtTime(0.15,ctx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);o2.start(ctx.currentTime);o2.stop(ctx.currentTime+0.4)},150)}catch(e){}}

/* ===== INIT — SIN TOKEN ===== */
function init(){
  showLoad();
  loadConfig().then(function(){
    loadTurno().then(function(){
      loadFormasPago().then(function(){
        loadPedidos();
        startAutoRefresh();
        hideLoad();
      }).catch(function(){hideLoad()});
    }).catch(function(){hideLoad()});
  }).catch(function(){hideLoad()});
}

function loadConfig(){return apiGet("init",{}).then(function(r){if(r.success&&r.data&&r.data.config){CONFIG=r.data.config}}).catch(function(e){})}
function loadTurno(){return apiGet("getTurnoActivo",{}).then(function(r){if(r.success){TURNO=r.turno;updateHeaderTurno();if(!TURNO){mostrarAlerta("error","Sin Turno","No hay turno activo. Vaya a Resumen del Turno para abrir uno.",function(){window.location.href="cajaturno.html"},"Ir a Turnos")}}}).catch(function(e){})}
function loadFormasPago(){return apiGet("getFormasPagoActivas",{}).then(function(r){if(r.success&&r.data){FORMAS_PAGO=r.data;TASAS={};r.data.forEach(function(fp){if(fp.CodTasa&&fp.ValorTasa!==undefined){TASAS[fp.CodTasa]=parseFloat(fp.ValorTasa)||0}})}}).catch(function(e){})}

function loadPedidos(){
  document.getElementById("refreshIndicator").classList.add("show");
  if(!TURNO||!TURNO.CodTurno){
    document.getElementById("refreshIndicator").classList.remove("show");
    renderPedidos([]);updateKPIs(0,0,0);
    return Promise.resolve();
  }
  return apiGet("getPedidosPorTurno",{codTurno:TURNO.CodTurno}).then(function(r){
    document.getElementById("refreshIndicator").classList.remove("show");
    if(r.success){PEDIDOS=r.data||[];renderPedidos(PEDIDOS);loadResumen()}
    else{toast("Error al cargar pedidos: "+(r.error||"Desconocido"),"err")}
  }).catch(function(e){document.getElementById("refreshIndicator").classList.remove("show");toast("Error de red: "+e.message,"err")});
}

function loadResumen(){if(!TURNO||!TURNO.CodTurno)return;apiGet("getResumenCaja",{codTurno:TURNO.CodTurno}).then(function(r){if(r.success){updateKPIs(r.totalGeneral||0,r.cantidadPagos||0,PEDIDOS.length)}}).catch(function(e){})}
function updateHeaderTurno(){var el=document.getElementById("headerTurno");var btn=document.getElementById("btnTurnoAction");if(TURNO&&TURNO.CodTurno){el.textContent="Turno "+TURNO.CodTurno;el.className="hTurno";btn.className="turnoBtn close";btn.title="Cerrar Turno";btn.innerHTML='<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>'}else{el.textContent="Sin Turno";el.className="hTurno closed";btn.className="turnoBtn open";btn.title="Abrir Turno";btn.innerHTML='<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>'}}
function updateKPIs(cobrado,pagos,porCobrar){document.getElementById("kpiCobrado").textContent=formatMoney(cobrado,"T002");document.getElementById("kpiPagos").textContent=pagos;document.getElementById("kpiPorCobrar").textContent=porCobrar;document.getElementById("countPorCobrar").textContent="("+porCobrar+")"}
function updateSecTitle(count){var titles={"todos":"📋 Todos los Pedidos","pendientepago":"⏳ Pendiente de Pago","porcobrar":"💰 Pedidos Por Cobrar","pagado":"✅ Pedidos Pagados","anulado":"🗑️ Pedidos Anulados"};var el=document.getElementById("secTitle");el.innerHTML=(titles[FILTRO_ACTUAL]||"📋 Pedidos")+' <span id="countPorCobrar">('+(count||0)+")</span>"}
function startAutoRefresh(){if(AUTO_REFRESH)clearInterval(AUTO_REFRESH);AUTO_REFRESH=setInterval(loadPedidos,30000)}

function renderPedidos(lista){
  var container=document.getElementById("listaPedidos");
  var filtrados=lista;
  if(BUSQUEDA){var q=BUSQUEDA.toLowerCase();filtrados=lista.filter(function(p){var nro=String(p.NroPedido||"").toLowerCase();var cliente=String(p.Cliente||"").toLowerCase();var tel=String(p.Telefono||"").toLowerCase();return nro.indexOf(q)>-1||cliente.indexOf(q)>-1||tel.indexOf(q)>-1})}
  if(FILTRO_ACTUAL==="pendientepago"){filtrados=filtrados.filter(function(p){var ed=String(p.EstadoPedido||"").trim();return ed==="Pendiente de Pago"})}
  else if(FILTRO_ACTUAL==="porcobrar"){filtrados=filtrados.filter(function(p){var ep=String(p.EstadoPago||"").trim();var ed=String(p.EstadoPedido||"").trim();return ep==="Pendiente"&&ed!=="Anulado"})}
  else if(FILTRO_ACTUAL==="pagado"){filtrados=filtrados.filter(function(p){return String(p.EstadoPago||"").trim()==="Pagado"})}
  else if(FILTRO_ACTUAL==="anulado"){filtrados=filtrados.filter(function(p){var ed=String(p.EstadoPedido||"").trim();return ed==="Anulado"})}
  updateSecTitle(filtrados.length);
  if(filtrados.length===0){container.innerHTML='<div class="emptyState"><div class="emptyStateIcon">📋</div><div style="font-size:13px">Sin pedidos</div></div>';return}
  var html="";filtrados.forEach(function(p){html+=renderOrderCard(p)});container.innerHTML=html;
}

function renderOrderCard(p){
  var estadoPedido=String(p.EstadoPedido||"").trim();
  var estadoPago=String(p.EstadoPago||"").trim();
  var tipoLabel=getTipoLabel(p.TipoServicio);
  var tipoClass=getTipoClass(p.TipoServicio);
  var hora=formatTime(p.HoraPedido);
  var total=formatMoney(p.TotalPedido,p.CodTasa);
  var estadoPedidoClass=estadoPedido.toLowerCase().replace(/\s/g,"");
  var estadoPagoClass=estadoPago==="Pagado"?"pagado":"nopagado";
  var badgeIcons={"Pendiente de Pago":"⏳","Pendiente":"🍳","En Preparacion":"👨‍🍳","Listo":"✅","Entregado":"📦","Anulado":"🚫"};
  var badgePagoIcon=estadoPago==="Pagado"?"💰":"⏳";
  var html='<div class="orderCard">';
  html+='<div class="orderHeader"><div class="orderNro">'+p.NroPedido+'</div><div class="orderTime">'+hora+'</div></div>';
  html+='<div class="orderClient">'+(p.Cliente||"Cliente")+'</div>';
  html+='<div class="orderPhone">📱 '+(p.Telefono||"N/A")+'</div>';
  if(p.itemsPreview&&p.itemsPreview.length>0){var itemsStr=p.itemsPreview.map(function(i){return(i.Cantidad||1)+"x "+(i.DesProducto||"Producto")}).join(", ");html+='<div class="orderItems">'+itemsStr+'</div>'}
  html+='<div class="orderFooter"><div class="orderTotal">'+total+'</div><div class="orderType '+tipoClass+'">'+tipoLabel+'</div></div>';
  html+='<div class="statusRow"><span class="statusChip '+estadoPedidoClass+'">'+(badgeIcons[estadoPedido]||"●")+" "+estadoPedido+'</span><span class="statusChip '+estadoPagoClass+'">'+badgePagoIcon+" "+(estadoPago==="Pagado"?"Pagado":"No Pagado")+'</span></div>';
  html+='<div class="cardActions">';
  if(estadoPago==="Pendiente"){html+='<button class="cardBtn primary" data-action="cobrar" data-nro="'+p.NroPedido+'" type="button">💰 Cobrar</button>'}
  if(estadoPedido==="Pendiente de Pago"){var puedeLiberar=true;var tooltip="";if(CONFIG.PedidoconPagoCaja==="Activo"&&estadoPago!=="Pagado"){puedeLiberar=false;tooltip="Cobrar primero (modo Activo)"}html+='<button class="cardBtn success" data-action="liberar" data-nro="'+p.NroPedido+'"'+(puedeLiberar?"":" disabled")+' type="button"'+(tooltip?' title="'+tooltip+'"':"")+'>🍳 Liberar</button>'}
  if(estadoPedido!=="Pendiente de Pago"&&estadoPedido!=="Entregado"&&estadoPedido!=="Cancelado"&&estadoPedido!=="Anulado"){html+='<button class="cardBtn secondary" disabled type="button">En Cocina</button>'}
  if(estadoPago==="Pagado"){html+='<button class="cardBtn secondary" data-action="reversar" data-nro="'+p.NroPedido+'" type="button">↩️ Reversar</button>'}
  if(estadoPedido!=="Cancelado"&&estadoPedido!=="Anulado"){html+='<button class="cardBtn danger" data-action="anular" data-nro="'+p.NroPedido+'" type="button">🗑️ Anular</button>'}
  html+='</div></div>';
  return html;
}

/* ===== DETAIL PANEL ===== */
function openDetail(nroPedido){
  var pedido=PEDIDOS.find(function(p){return p.NroPedido===nroPedido});
  if(!pedido){mostrarAlerta("error","Error","Pedido no encontrado");return}
  PEDIDO_ACTUAL=pedido;
  document.getElementById("detailNro").textContent=pedido.NroPedido;
  document.getElementById("detailHora").textContent=formatTime(pedido.HoraPedido);
  var estadoPedido=String(pedido.EstadoPedido||"").trim();
  var estadoPedidoClass=estadoPedido.toLowerCase().replace(/\s/g,"");
  var badgeIcons={"Pendiente de Pago":"⏳","Pendiente":"🍳","En Preparacion":"👨‍🍳","Listo":"✅","Entregado":"📦","Anulado":"🚫"};
  var detailStatus=document.getElementById("detailStatus");
  detailStatus.textContent=(badgeIcons[estadoPedido]||"●")+" "+estadoPedido;
  detailStatus.className="statusChip "+estadoPedidoClass;
  var html="";
  html+='<div class="detailSection">';
  html+='<div class="detailSectionTitle">Informacion del Pedido</div>';
  html+='<div class="detailRow"><span class="detailLabel">Cliente</span><span class="detailValue">'+(pedido.Cliente||"N/A")+'</span></div>';
  html+='<div class="detailRow"><span class="detailLabel">Telefono</span><span class="detailValue">'+(pedido.Telefono||"N/A")+'</span></div>';
  html+='<div class="detailRow"><span class="detailLabel">Tipo</span><span class="detailValue">'+getTipoLabel(pedido.TipoServicio)+'</span></div>';
  html+='<div class="detailRow"><span class="detailLabel">Estado Pago</span><span class="detailValue">'+(pedido.EstadoPago||"N/A")+'</span></div>';
  html+='<div class="detailRow"><span class="detailLabel">Total</span><span class="detailValue price">'+formatMoney(pedido.TotalPedido,pedido.CodTasa)+'</span></div>';
  html+='</div>';
  if(pedido.itemsPreview&&pedido.itemsPreview.length>0){
    html+='<div class="detailSection">';
    html+='<div class="detailSectionTitle">📦 Productos ('+pedido.itemsPreview.length+')</div>';
    pedido.itemsPreview.forEach(function(item){
      html+='<div class="itemRow">';
      html+='<div class="itemQty">'+(item.Cantidad||1)+'</div>';
      html+='<div class="itemInfo"><div class="itemName">'+(item.DesProducto||"Producto")+'</div></div>';
      html+='<div class="itemPrice">'+(item.PrecioUnitario?formatMoney(item.PrecioUnitario,pedido.CodTasa):"")+'</div>';
      html+='</div>';
    });
    html+='</div>';
  }
  html+='<div class="detailSection">';
  html+='<div class="detailSectionTitle">💳 Pagos Registrados</div>';
  html+='<div id="detailPagosContent" style="text-align:center;color:#6b7280;padding:10px;font-size:13px">Cargando pagos...</div>';
  html+='</div>';
  document.getElementById("detailBody").innerHTML=html;
  var footerHtml="";
  var estadoPago=String(pedido.EstadoPago||"").trim();
  var estadoPedidoStr=String(pedido.EstadoPedido||"").trim();
  if(estadoPago==="Pendiente"&&estadoPedidoStr!=="Anulado"){footerHtml+='<button class="cardBtn primary" style="width:100%;margin-bottom:8px" id="detailBtnCobrar" type="button">💰 Cobrar</button>'}
  if(estadoPedidoStr==="Pendiente de Pago"&&(CONFIG.PedidoconPagoCaja!=="Activo"||estadoPago==="Pagado")){footerHtml+='<button class="cardBtn success" style="width:100%;margin-bottom:8px" id="detailBtnLiberar" type="button">🍳 Liberar a Cocina</button>'}
  if(estadoPago==="Pagado"){footerHtml+='<button class="cardBtn secondary" style="width:100%;margin-bottom:8px" id="detailBtnReversar" type="button">↩️ Reversar Pago</button>'}
  if(estadoPedidoStr!=="Anulado"&&estadoPedidoStr!=="Cancelado"){footerHtml+='<button class="cardBtn danger" style="width:100%" id="detailBtnAnular" type="button">🗑️ Anular Pedido</button>'}
  document.getElementById("detailFooter").innerHTML=footerHtml;
  if(document.getElementById("detailBtnCobrar")){document.getElementById("detailBtnCobrar").addEventListener("click",function(){window.location.href="cajacobro.html?pedido="+pedido.NroPedido+"&action=cobrar"})}
  if(document.getElementById("detailBtnLiberar")){document.getElementById("detailBtnLiberar").addEventListener("click",function(){window.location.href="cajacobro.html?pedido="+pedido.NroPedido+"&action=liberar"})}
  if(document.getElementById("detailBtnReversar")){document.getElementById("detailBtnReversar").addEventListener("click",function(){window.location.href="cajacobro.html?pedido="+pedido.NroPedido+"&action=reversar"})}
  if(document.getElementById("detailBtnAnular")){document.getElementById("detailBtnAnular").addEventListener("click",function(){window.location.href="cajacobro.html?pedido="+pedido.NroPedido+"&action=anular"})}
  document.getElementById("detailPanel").classList.add("open");
  document.getElementById("detailOverlay").classList.add("show");
  loadPagosPedido(pedido.NroPedido);
}

function loadPagosPedido(nroPedido){
  apiGet("getPagosPorPedido",{nroPedido:nroPedido}).then(function(r){
    var container=document.getElementById("detailPagosContent");
    if(!container)return;
    if(r.success&&r.data&&r.data.length>0){
      var html="";
      r.data.forEach(function(pago){
        html+='<div class="detailRow" style="border-bottom:1px solid rgba(255,255,255,0.03);padding:8px 0">';
        html+='<div style="display:flex;flex-direction:column;gap:2px">';
        html+='<span style="font-size:13px;font-weight:600;color:#fff">'+(pago.DesFormaPago||pago.CodFormaPago)+'</span>';
        if(pago.Referencia){html+='<span style="font-size:11px;color:#9ca3af">Ref: '+pago.Referencia+'</span>'}
        html+='</div>';
        html+='<span class="detailValue price">'+formatMoney(pago.MontoPago,pago.CodTasa)+'</span>';
        html+='</div>';
      });
      container.innerHTML=html;
    }else{container.innerHTML='<div style="text-align:center;color:#6b7280;padding:10px;font-size:13px">Sin pagos registrados</div>'}
  }).catch(function(e){var container=document.getElementById("detailPagosContent");if(container)container.innerHTML='<div style="text-align:center;color:#ef4444;padding:10px;font-size:13px">Error al cargar pagos</div>'});
}

function closeDetail(){document.getElementById("detailPanel").classList.remove("open");document.getElementById("detailOverlay").classList.remove("show")}

/* ===== EVENT LISTENERS ===== */
document.addEventListener("DOMContentLoaded",function(){
  init();
  document.getElementById("btnBack").addEventListener("click",function(){window.location.href="admin.html"});
  document.getElementById("btnPedidos").addEventListener("click",function(){window.location.href="pedidos.html"});
  document.getElementById("btnTurnoAction").addEventListener("click",function(){window.location.href="cajaturno.html"});
  document.getElementById("btnRefresh").addEventListener("click",loadPedidos);
  document.getElementById("soundToggle").addEventListener("click",function(){SOUND_ON=!SOUND_ON;var btn=document.getElementById("soundToggle");btn.classList.toggle("on",SOUND_ON);toast(SOUND_ON?"Sonido activado":"Sonido desactivado","info")});
  document.getElementById("searchInput").addEventListener("input",function(){BUSQUEDA=this.value.trim();renderPedidos(PEDIDOS)});
  document.getElementById("btnResumen").addEventListener("click",function(){window.location.href="cajaturno.html"});
  document.querySelectorAll(".filterChip").forEach(function(chip){chip.addEventListener("click",function(){document.querySelectorAll(".filterChip").forEach(function(c){c.classList.remove("active")});this.classList.add("active");FILTRO_ACTUAL=this.dataset.filter;renderPedidos(PEDIDOS)})});
  document.getElementById("detailBackBtn").addEventListener("click",closeDetail);
  document.getElementById("detailOverlay").addEventListener("click",closeDetail);
  document.getElementById("listaPedidos").addEventListener("click",function(e){
    var btn=e.target.closest("[data-action]");
    if(btn){var action=btn.dataset.action;var nro=btn.dataset.nro;window.location.href="cajacobro.html?pedido="+nro+"&action="+action;return}
    var card=e.target.closest(".orderCard");
    if(card){var nroPedido=card.querySelector(".orderNro").textContent;openDetail(nroPedido)}
  });
});
</script>
