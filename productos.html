<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Productos - FastBurguer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

#load{position:fixed;inset:0;background:rgba(10,10,10,0.9);display:none;justify-content:center;align-items:center;z-index:9999;flex-direction:column;gap:12px}
#load.show{display:flex}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:#f7931e;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#toast{position:fixed;top:16px;right:16px;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;display:none;backdrop-filter:blur(10px)}
#toast.ok{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22c55e}
#toast.err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444}

#menuOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:998;opacity:0;transition:opacity 0.3s;pointer-events:none}
#menuOverlay.show{opacity:1;pointer-events:auto}
#menuPanel{position:fixed;left:0;top:0;width:220px;height:100vh;background:#111;z-index:999;border-right:1px solid rgba(255,255,255,0.06);transform:translateX(-100%);transition:transform 0.3s ease;padding:20px 0}
#menuPanel.open{transform:translateX(0)}
.menuItem{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:0.2s;font-size:14px;font-weight:500;color:#d1d5db}
.menuItem:hover{background:rgba(255,107,53,0.08);color:#fff}

.header{position:fixed;top:0;left:0;right:0;height:54px;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:100}
.hBtn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:0.2s;background:rgba(255,255,255,0.05);border:none;color:#fff}
.hBtn:active{transform:scale(0.93);background:rgba(255,107,53,0.15)}
.hTitle{font-size:15px;font-weight:700;color:#f7931e}
.hRegresar{background:#ef4444!important;color:#fff!important;padding:0 14px!important;width:auto!important;font-size:13px;font-weight:600}

.searchBar{position:fixed;top:54px;left:0;right:0;padding:10px 12px;background:rgba(10,10,10,0.95);border-bottom:1px solid rgba(255,255,255,0.06);z-index:99;display:flex;align-items:center;gap:8px}
.searchIcon{color:#6b7280;width:18px;height:18px;flex-shrink:0}
.searchInput{flex:1;background:rgba(26,26,26,0.8);border:1.5px solid rgba(255,255,255,0.08);color:#fff;border-radius:10px;padding:10px 12px;font-size:14px;outline:none;transition:0.3s}
.searchInput:focus{border-color:#ff6b35}
.searchInput::placeholder{color:#4b5563}
.searchClear{color:#6b7280;font-size:12px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:0.2s}
.searchClear:hover{color:#ef4444}
.filterSelect{background:rgba(26,26,26,0.8);border:1.5px solid rgba(255,255,255,0.08);color:#fff;border-radius:10px;padding:10px 8px;font-size:13px;outline:none;transition:0.3s;flex-shrink:0}
.filterSelect:focus{border-color:#ff6b35}

.cardsArea{padding:120px 12px 90px}
.tableWrap{background:#111;border:1.5px solid rgba(255,255,255,0.06);border-radius:12px;overflow:hidden}
.tableHeader{display:flex;background:linear-gradient(135deg,rgba(255,107,53,0.2),rgba(247,147,30,0.1));border-bottom:1.5px solid rgba(255,107,53,0.3);padding:12px 14px;font-size:11px;font-weight:700;color:#f7931e;text-transform:uppercase;letter-spacing:0.5px}
.th{flex:1;padding:0 4px}
.th:first-child{flex:0.7}
.th:last-child{flex:0.5;text-align:right}
.thCheck{flex:0;width:30px;padding:0;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

.tableRow{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:0.2s;position:relative}
.tableRow:last-child{border-bottom:none}
.tableRow:hover{background:rgba(255,107,53,0.03)}
.tableRow.sel{background:rgba(255,107,53,0.08)}
.tableRow.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#ff6b35}

.rowCheck{width:20px;height:20px;border:2px solid rgba(255,255,255,0.2);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:0.2s;margin-right:10px}
.tableRow.sel .rowCheck{border-color:#ff6b35;background:#ff6b35}
.rowCheck svg{width:12px;height:12px;color:#fff;display:none}
.tableRow.sel .rowCheck svg{display:block}

.td{flex:1;padding:0 4px;font-size:14px;color:#fff}
.td:first-child{flex:0.7;font-family:monospace;font-size:13px;color:#9ca3af}
.td:last-child{flex:0.5;text-align:right;color:#f7931e;font-weight:700}

.rowToggle{width:36px;height:20px;background:#ef4444;border-radius:10px;position:relative;cursor:pointer;transition:0.3s;flex-shrink:0;margin-left:8px}
.rowToggle.on{background:#22c55e}
.rowToggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:0.3s;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.rowToggle.on::after{left:18px}

.actionBar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);padding:12px 16px;display:flex;gap:10px;z-index:97}
.actionBtn{flex:1;padding:12px;border:none;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.actionBtn:disabled{opacity:0.4;cursor:not-allowed}
.btnAdd{background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff}
.btnAdd:active{transform:scale(0.97)}
.btnEdit{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff}
.btnEdit:active{transform:scale(0.97)}
.btnDel{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
.btnDel:active{transform:scale(0.97)}

#modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:none;justify-content:center;align-items:center;padding:16px}
#modalOverlay.show{display:flex}
.modalCard{background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;animation:modalIn 0.3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modalHeader{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.modalTitle{font-size:18px;font-weight:800;color:#f7931e}
.modalClose{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.05);border:none;color:#9ca3af;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.modalClose:hover{background:rgba(255,255,255,0.1);color:#fff}
.modalBody{padding:16px 20px 20px}
.fLabel{display:block;font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;margin-top:14px}
.fInput{width:100%;background:rgba(26,26,26,0.8);border:1.5px solid rgba(255,255,255,0.08);color:#fff;border-radius:10px;padding:12px 14px;font-size:14px;outline:none;transition:0.3s}
.fInput:focus{border-color:#ff6b35;box-shadow:0 0 0 3px rgba(255,107,53,0.12)}
.fInput::placeholder{color:#4b5563}
.fInput:disabled{background:rgba(10,10,10,0.6);color:#6b7280;cursor:not-allowed}
.fInput.invalid{border-color:#ef4444!important}
.modalToggleWrap{display:flex;align-items:center;gap:10px;margin-top:4px}
.modalToggle{width:48px;height:26px;background:#ef4444;border-radius:13px;position:relative;cursor:pointer;transition:0.3s}
.modalToggle.on{background:#22c55e}
.modalToggle::after{content:'';position:absolute;width:22px;height:22px;background:#fff;border-radius:50%;top:2px;left:2px;transition:0.3s;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.modalToggle.on::after{left:24px}
.modalToggleTxt{font-size:13px;font-weight:500}
.modalBtns{display:flex;gap:10px;margin-top:20px}
.modalBtns button{flex:1;padding:12px;border:none;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;transition:0.2s}
.btnSave{background:#22c55e;color:#fff}
.btnSave:active{transform:scale(0.97)}
.btnCan{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#9ca3af}
.btnCan:active{transform:scale(0.97)}
.modalToggle.disabled{cursor:not-allowed;opacity:0.5}
.rowToggle.noclick{cursor:default;pointer-events:none}

.emptyState{text-align:center;padding:60px 20px;color:#6b7280}
.emptyStateIcon{font-size:48px;margin-bottom:12px;opacity:0.5}
.errorState{text-align:center;padding:40px 20px;color:#ef4444}
.errorStateIcon{font-size:40px;margin-bottom:12px}
.retryBtn{margin-top:16px;padding:10px 20px;background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.3);color:#ff6b35;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600}
#confirmOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;display:none;justify-content:center;align-items:center;padding:16px;backdrop-filter:blur(8px)}
#confirmOverlay.show{display:flex}
.confirmCard{background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:20px;width:100%;max-width:340px;padding:24px;text-align:center;animation:modalIn 0.3s ease}
.confirmTitle{font-size:18px;font-weight:800;color:#f7931e;margin-bottom:12px}
.confirmMsg{font-size:14px;color:#d1d5db;margin-bottom:24px;line-height:1.5}
.confirmBtns{display:flex;gap:12px}
.btnConfirmCan{flex:1;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#9ca3af;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;transition:0.2s}
.btnConfirmCan:hover{background:rgba(255,255,255,0.1);color:#fff}
.btnConfirmDel{flex:1;padding:12px;background:linear-gradient(135deg,#ef4444,#dc2626);border:none;color:#fff;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;transition:0.2s}
.btnConfirmDel:active{transform:scale(0.97)}
</style>
</head>
<body>

<div id="load"><div class="spin"></div><div style="color:#9ca3af;font-size:13px">Cargando...</div></div>
<div id="toast"></div>

<div id="menuOverlay" onclick="closeMenu()"></div>
<div id="menuPanel">
<div style="padding:0 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:8px">
<div style="font-weight:700;font-size:15px">FastBurguer</div>
<div style="font-size:12px;color:#6b7280">Productos</div>
</div>
<div class="menuItem" onclick="doAdd()">Agregar</div>
<div class="menuItem" onclick="doEdit()">Editar</div>
<div class="menuItem" onclick="doDel()">Borrar</div>
<div class="menuItem" style="border-top:1px solid rgba(255,255,255,0.06);margin-top:8px" onclick="toggleViewInactivos()">
<span style="flex:1;font-size:14px;font-weight:500;color:#d1d5db">Ver Inactivos</span>
<div class="modalToggle" id="menuToggle" style="pointer-events:none"></div>
</div>
</div>

<div class="header">
<button class="hBtn" onclick="openMenu()">
<svg style="width:20px;height:20px;color:#f7931e" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
</svg>
</button>
<div class="hTitle">Productos</div>
<button class="hBtn hRegresar" onclick="location.href='admin.html'">Regresar</button>
</div>

<div class="searchBar">
<svg class="searchIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
</svg>
<input type="text" id="searchInput" class="searchInput" placeholder="Buscar..." autocomplete="off">
<span class="searchClear" id="searchClear" onclick="clearSearch()">X</span>
<select id="filterField" class="filterSelect" onchange="render()">
<option value="all">Todo</option>
<option value="CodProducto">Codigo</option>
<option value="DesProducto">Nombre</option>
</select>
</div>

<div class="cardsArea" id="main"></div>

<div class="actionBar">
<button class="actionBtn btnAdd" id="btnAdd" onclick="openAddModal()">Agregar</button>
<button class="actionBtn btnEdit" id="btnEdit" onclick="openEditModal()" disabled>Editar</button>
<button class="actionBtn btnDel" id="btnDel" onclick="doDel()" disabled>Borrar</button>
</div>

<div id="modalOverlay" onclick="closeModal(event)">
<div class="modalCard" onclick="event.stopPropagation()">
<div class="modalHeader">
<div class="modalTitle" id="modalTitle">Nuevo Producto</div>
<button class="modalClose" onclick="closeModal()">
<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
</svg>
</button>
</div>
<div class="modalBody">
<div class="fLabel">Codigo</div>
<input type="text" id="fCod" class="fInput" disabled>

<div class="fLabel">Imagen URL</div>
<input type="text" id="fImg" class="fInput" placeholder="https://...">

<div class="fLabel">Categoria</div>
<select id="fCat" class="fInput" onchange="onCatChange()">
<option value="">Seleccione...</option>
</select>
<input type="hidden" id="fCatDes">

<div class="fLabel">Producto</div>
<input type="text" id="fDesc" class="fInput" placeholder="Ej: Hamburguesa Clasica">

<div class="fLabel">Detalle</div>
<input type="text" id="fDet" class="fInput" placeholder="Ej: Carne 150g, queso, lechuga">

<div class="fLabel">Clase</div>
<input type="text" id="fClase" class="fInput" placeholder="Ej: Premium">

<div class="fLabel">Stock</div>
<select id="fStock" class="fInput">
<option value="Disponible">Disponible</option>
<option value="No Disponible">No Disponible</option>
</select>

<div class="fLabel">Cod Tasa</div>
<select id="fTasa" class="fInput"><option value="">Seleccione...</option></select>

<div class="fLabel">Costo</div>
<input type="number" id="fCosto" class="fInput" step="0.01" placeholder="0.00">

<div class="fLabel">Precio</div>
<input type="number" id="fPrecio" class="fInput" step="0.01" placeholder="0.00">

<div class="fLabel">Estado</div>
<div class="modalToggleWrap">
<div class="modalToggle on" id="fToggle" onclick="toggleFormState()"></div>
<span class="modalToggleTxt" id="fToggleTxt">Activo</span>
</div>

<div class="modalBtns">
<button class="btnSave" onclick="save()">Guardar</button>
<button class="btnCan" onclick="closeModal()">Cancelar</button>
</div>
</div>
</div>
</div>

<script>
var API="https://script.google.com/macros/s/AKfycbxqlBT5nM5UuJe-5IAXu6YewZxeV5r9FoXBkMYwPD4xkK1llpxakpExC6DspQvnOI6Vmw/exec";
var urlToken="";var href=window.location.href;var match=href.match(/[?&]t=([^&]+)/);if(match){urlToken=decodeURIComponent(match[1])}
var TOKEN=urlToken||sessionStorage.getItem("fb_token")||localStorage.getItem("fb_token")||"";
var ROWS=[];var SEL=null;var FORM_STATE=true;var MODAL_MODE="add";var SHOW_INACTIVOS=false;var CATEGORIAS=[];var TASAS=[];

function showLoad(){document.getElementById("load").className="show"}
function hideLoad(){document.getElementById("load").className=""}
function toast(m,ok){var t=document.getElementById("toast");t.textContent=m;t.className=ok?"ok":"err";t.style.display="block";setTimeout(function(){t.style.display="none"},3000)}

function apiGet(action,params){var url=API+"?action="+action+"&_cb="+Date.now();if(params)for(var key in params)url+="&"+key+"="+encodeURIComponent(params[key]);return fetch(url).then(function(r){return r.json()})}

function loadCategorias(){
return apiGet("adminData",{method:"GET",sheetName:"Categorias",token:TOKEN})
.then(function(r){
 if(r.success){
  CATEGORIAS=r.data||[];
  var sel=document.getElementById("fCat");
  sel.innerHTML='<option value="">Seleccione...</option>';
  for(var i=0;i<CATEGORIAS.length;i++){
   var c=CATEGORIAS[i];
   if(c.Estado==="Activo"){
    var opt=document.createElement("option");
    opt.value=c.CodCategoria||"";
    opt.textContent=(c.CodCategoria||"")+" - "+(c.DesCategoria||"");
    sel.appendChild(opt);
   }
  }
 }
});
}
function onCatChange(){
var cod=document.getElementById("fCat").value;
var des="";
for(var i=0;i<CATEGORIAS.length;i++){
 if(CATEGORIAS[i].CodCategoria===cod){des=CATEGORIAS[i].DesCategoria||"";break;}
}
document.getElementById("fCatDes").value=des;
}

function loadTasas(){
return apiGet("adminData",{method:"GET",sheetName:"Tasas",token:TOKEN})
.then(function(r){
 if(r.success){
  TASAS=r.data||[];
  var sel=document.getElementById("fTasa");
  sel.innerHTML='<option value="">Seleccione...</option>';
  for(var i=0;i<TASAS.length;i++){
   var t=TASAS[i];
   if(t.Estado==="Activo"){
    var opt=document.createElement("option");
    opt.value=t.CodTasa||"";
    opt.textContent=(t.CodTasa||"")+" - "+(t.DesTasa||"");
    sel.appendChild(opt);
   }
  }
 }
});
}

function apiPost(d){return fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(d)}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();}).then(function(t){try{return JSON.parse(t);}catch(e){throw new Error("Respuesta no es JSON: "+t.substring(0,200));}})}

function normalize(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}

function openMenu(){document.getElementById("menuPanel").className="open";document.getElementById("menuOverlay").className="show"}
function closeMenu(){document.getElementById("menuPanel").className="";document.getElementById("menuOverlay").className=""}

function init(){
if(!TOKEN){location.href="admin.html";return}
if(urlToken){sessionStorage.setItem("fb_token",TOKEN);localStorage.setItem("fb_token",TOKEN)}
showLoad();
apiPost({action:"validateToken",token:TOKEN})
.then(function(r){
 if(!r.success){sessionStorage.removeItem("fb_token");localStorage.removeItem("fb_token");location.href="admin.html";return}
 return loadCategorias().then(function(){return loadTasas();}).then(function(){loadData();});
})
.catch(function(e){hideLoad();toast("Error de red",false)});
}

function loadData(){
showLoad();
apiGet("adminData",{method:"GET",sheetName:"ProductoMenu",token:TOKEN})
.then(function(r){
 hideLoad();
 if(r.success){ROWS=r.data||[];render()}
 else{showError(r.error||"Error al cargar datos")}
})
.catch(function(e){hideLoad();showError("Error de red al cargar productos")});
}

function showError(msg){
var m=document.getElementById("main");
m.innerHTML='<div class="errorState"><div class="errorStateIcon">&#9888;</div><div>'+msg+'</div><button class="retryBtn" onclick="loadData()">Reintentar</button></div>';
}

function render(){
var m=document.getElementById("main");
m.innerHTML="";
var filtered=getVisibleRows();
if(filtered.length===0){
 m.innerHTML='<div class="emptyState"><div class="emptyStateIcon">&#128202;</div>No se encontraron productos</div>';
 return;
}
var wrap=document.createElement("div");wrap.className="tableWrap";
var header=document.createElement("div");header.className="tableHeader";
header.innerHTML='<div class="th thCheck">&#128203;</div><div class="th">Codigo</div><div class="th">Producto</div><div class="th">Categoria</div><div class="th">Precio</div><div class="th">Estado</div>';
wrap.appendChild(header);
for(var i=0;i<filtered.length;i++){
var r=filtered[i];
var st=r.Estado==="Activo";
var isSel=SEL&&SEL.CodProducto===r.CodProducto;
var row=document.createElement("div");
row.className="tableRow"+(isSel?" sel":"")+(st?"":" inact");
row.onclick=function(idx){return function(){selectCard(idx)}}(i);
row.innerHTML='<div class="rowCheck"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg></div><div class="td">'+(r.CodProducto||"")+'</div><div class="td">'+(r.DesProducto||"")+'</div><div class="td">'+(r.DesCategoria||"")+'</div><div class="td">'+(r.Precio||"0")+'</div><div class="rowToggle '+(st?"on":"")+' noclick"></div>';
wrap.appendChild(row);
}
m.appendChild(wrap);
updateActionButtons();
}

function getVisibleRows(){
var q=normalize(document.getElementById("searchInput").value);
var field=document.getElementById("filterField").value;
var out=ROWS;
if(!SHOW_INACTIVOS){
 out=out.filter(function(r){return r.Estado==="Activo";});
}else{
 out=out.filter(function(r){return r.Estado==="Inactivo";});
}
if(!q)return out;
return out.filter(function(r){
if(field==="all"){return normalize(r.CodProducto).indexOf(q)!==-1||normalize(r.DesProducto).indexOf(q)!==-1||normalize(r.DesCategoria).indexOf(q)!==-1}
if(field==="CodProducto")return normalize(r.CodProducto).indexOf(q)!==-1;
if(field==="DesProducto")return normalize(r.DesProducto).indexOf(q)!==-1;
return false;
});
}
